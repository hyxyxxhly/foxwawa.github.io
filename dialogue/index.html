<!DOCTYPE html>
<html lang="ja" class="lang-ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="description" content="対話 / Dialogue — 物体同士の対話を通して自己と存在を問い直す、何梁宇のARシリーズ作品。">
<title>対話 — 何梁宇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Noto+Sans+SC:wght@300;400;500;700;900&amp;family=Noto+Serif+JP:wght@300;400;500;600&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --paper:#fff;
  --paper-2:#f4f4f1;
  --ink:#090909;
  --ink-2:#3e3e3a;
  --muted:#84847e;
  --line:rgba(9,9,9,.16);
  --line-dark:rgba(255,255,255,.18);
  --signal:#3f62ff;
  --mono:"Space Mono",monospace;
  --serif:"Noto Serif JP",serif;
  --sans:"Inter","Helvetica Neue",Arial,sans-serif;
  --nav-h:58px;
  --page-pad:clamp(1.25rem,4vw,4.5rem);
  --content:1680px;
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--paper)}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body,button,a,summary{font-family:inherit}
img{max-width:100%;display:block}
a{color:inherit}
button{color:inherit}
.lang-ja .display,.lang-ja .body-copy,.lang-ja .work-name,.lang-ja .voice-copy{font-family:var(--serif)}
.lang-zh .display,.lang-zh .body-copy,.lang-zh .work-name,.lang-zh .voice-copy{font-family:"Noto Sans SC",sans-serif}
.lang-en .display,.lang-en .body-copy,.lang-en .work-name,.lang-en .voice-copy{font-family:var(--sans)}
.skip-link{position:fixed;z-index:1000;top:.6rem;left:.6rem;padding:.65rem .9rem;background:var(--ink);color:#fff;transform:translateY(-160%);transition:transform .2s;text-decoration:none;font:700 11px/1 var(--mono);letter-spacing:.08em}
.skip-link:focus{transform:translateY(0)}
:focus-visible{outline:2px solid var(--signal);outline-offset:4px}
.shell{width:min(100%,var(--content));margin:0 auto;padding-inline:var(--page-pad)}
.eyebrow{margin:0;font:700 10px/1.4 var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.section-no{color:var(--signal);margin-right:.8rem}
.display{font-weight:400;letter-spacing:-.025em}
.body-copy{font-size:clamp(.96rem,1.15vw,1.08rem);line-height:1.95;color:var(--ink-2);text-wrap:pretty}
.body-copy p{margin:0}
.body-copy p+p{margin-top:1em}
.section-head{display:grid;grid-template-columns:minmax(0,1fr) minmax(17rem,.55fr);gap:clamp(2rem,6vw,7rem);align-items:end;margin-bottom:clamp(2.5rem,5vw,5rem)}
.section-title{font-size:clamp(2.25rem,5.4vw,5.6rem);line-height:.98;margin:.75rem 0 0;max-width:11ch}
.section-intro{margin:0 0 .2rem;max-width:38rem}

/* navigation */
.site-nav{position:fixed;z-index:100;inset:0 0 auto;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding-inline:var(--page-pad);background:rgba(255,255,255,.84);border-bottom:1px solid var(--line);transition:background .25s;color:var(--ink);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.site-nav.solid{background:rgba(255,255,255,.97)}
.nav-left,.nav-right{display:flex;align-items:center}
.nav-left{gap:1.25rem}
.nav-right{gap:1.5rem}
.nav-back,.lang-button{font:700 9px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;text-decoration:none}
.nav-back{font-size:14px;line-height:1}
.nav-title{font-size:13px;font-weight:600;text-decoration:none}
.lang-ja .nav-title{font-family:var(--serif);font-weight:500}
.lang-button{display:flex;align-items:center;gap:.55rem;background:none;border:0;padding:.4rem 0;cursor:pointer}
.lang-button svg{width:18px;height:18px}
.lang-code{min-width:2ch}

/* hero */
.hero{min-height:100svh;display:grid;grid-template-columns:minmax(0,58%) minmax(26rem,42%);background:#e9e9e7}
.hero-media{position:relative;min-height:100svh;overflow:hidden;border-right:1px solid rgba(0,0,0,.12)}
.hero-media img{width:100%;height:100%;object-fit:cover;object-position:center}
.hero-media::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.18),transparent 22%,transparent 76%,rgba(0,0,0,.16));pointer-events:none}
.hero-copy{min-height:100svh;padding:calc(var(--nav-h) + clamp(2.3rem,6vh,5.5rem)) clamp(2rem,4vw,5rem) clamp(2rem,5vh,4rem);display:flex;flex-direction:column;background:var(--paper)}
.hero-kicker{display:flex;justify-content:space-between;gap:1rem}
.hero-title{font-size:clamp(4.2rem,8vw,8.4rem);line-height:.86;margin:clamp(2rem,6vh,4.6rem) 0 .8rem}
.hero-sub{margin:0;font:700 9px/1.5 var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.overview{margin-top:clamp(2.5rem,6vh,5rem);padding-top:1.4rem;border-top:1px solid var(--line)}
.overview-title{font-size:clamp(1.45rem,2.35vw,2.5rem);line-height:1.3;margin:.75rem 0 1.2rem;max-width:20ch}
.overview .body-copy{max-width:42rem}
.ar-premise{margin-top:clamp(2rem,4vh,3.2rem);padding:1.15rem 0 0;border-top:1px solid var(--line);display:grid;grid-template-columns:3.25rem 1fr;gap:1.15rem}
.ar-mark{font:700 12px/1 var(--mono);letter-spacing:.1em;color:var(--signal);padding-top:.15rem}
.ar-premise h3{font-size:clamp(1.05rem,1.4vw,1.3rem);line-height:1.4;margin:0 0 .55rem}
.ar-premise p{font-size:.88rem;line-height:1.75;margin:0;color:var(--ink-2)}
.ar-premise p+p{margin-top:.8rem}
.hero-specs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));margin-top:auto;padding-top:2rem}
.hero-spec{border-top:1px solid var(--line);padding:.85rem 1rem 0 0}
.hero-spec+.hero-spec{padding-left:1rem;border-left:1px solid var(--line)}
.spec-label{display:block;font:700 8px/1.3 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.spec-value{font:700 10px/1.55 var(--mono)}
.scroll-cue{position:absolute;z-index:2;left:var(--page-pad);bottom:1.6rem;color:#fff;display:flex;align-items:center;gap:.8rem;font:700 8px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase}
.scroll-cue::before{content:"";width:2.5rem;height:1px;background:currentColor;animation:breathe 2.2s ease-in-out infinite;transform-origin:left}
@keyframes breathe{0%,100%{transform:scaleX(.45);opacity:.45}50%{transform:scaleX(1);opacity:1}}

/* research atlas */
.research{padding:clamp(6rem,12vw,11rem) 0;background:var(--paper)}
.research-grid{display:grid;grid-template-columns:minmax(18rem,.72fr) minmax(0,1.55fr);gap:clamp(3rem,6vw,8rem);align-items:start}
.research-copy{position:sticky;top:calc(var(--nav-h) + 2.5rem)}
.research-title{font-size:clamp(2.2rem,4.7vw,5.1rem);line-height:1.02;margin:.9rem 0 2rem;max-width:9ch}
.research-copy .body-copy{max-width:34rem}
.research-insight-label{margin:2.6rem 0 .65rem;color:var(--signal)}
.relation-axis{margin-top:0;border-top:1px solid var(--line)}
.relation-row{display:grid;grid-template-columns:2rem 1fr;gap:1rem;padding:.9rem 0;border-bottom:1px solid var(--line);align-items:center}
.relation-row span:first-child{font:700 9px/1 var(--mono);color:var(--signal)}
.relation-row span:last-child{font:700 10px/1.5 var(--mono);letter-spacing:.08em;text-transform:uppercase}
.atlas{display:grid;grid-template-columns:1.02fr .98fr;grid-template-rows:minmax(260px,46vh) minmax(220px,38vh);gap:1px;background:var(--line);border:1px solid var(--line)}
.atlas-figure{margin:0;background:var(--paper-2);overflow:hidden;position:relative}
.atlas-figure:first-child{grid-row:1/-1}
.atlas-figure img{width:100%;height:100%;object-fit:contain;transition:transform .7s cubic-bezier(.2,.65,.2,1)}
.atlas-figure:hover img{transform:scale(1.018)}
.atlas-pair{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);min-height:0}
.atlas-cap{position:absolute;left:.8rem;bottom:.65rem;padding:.35rem .45rem;background:rgba(255,255,255,.88);font:700 8px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase}

/* concept */
.concept{background:#090909;color:#fff;padding:clamp(6rem,12vw,11rem) 0}
.concept .eyebrow,.concept .body-copy{color:rgba(255,255,255,.62)}
.concept .section-head{margin-bottom:clamp(3rem,6vw,6rem)}
.concept .section-title{max-width:13ch}
.concept-intro{display:grid;grid-template-columns:minmax(0,.88fr) minmax(18rem,.52fr);gap:clamp(3rem,7vw,9rem);align-items:start}
.concept-thesis{font-size:clamp(1.75rem,3.5vw,4.1rem);line-height:1.16;margin:.75rem 0 0;max-width:18ch}
.concept-purpose{padding-top:.45rem}
.concept-purpose .body-copy{font-size:clamp(1rem,1.25vw,1.15rem)}
.absurdity{margin:clamp(4rem,8vw,8rem) 0;border-top:1px solid var(--line-dark)}
.absurdity-head{padding:1.1rem 0 1.6rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line-dark)}
.absurdity-list{list-style:none;padding:0;margin:0}
.absurdity-item{display:grid;grid-template-columns:clamp(3rem,8vw,8rem) 1fr auto;gap:1rem;align-items:center;padding:clamp(1rem,2vw,1.7rem) 0;border-bottom:1px solid var(--line-dark)}
.absurdity-item .num{font:700 10px/1 var(--mono);color:var(--signal)}
.absurdity-item .text{font-size:clamp(1.1rem,2.2vw,2.35rem);line-height:1.25}
.absurdity-item .mark{font:400 clamp(1.2rem,2vw,2rem)/1 var(--mono);color:rgba(255,255,255,.28)}
.concept-context{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1px;background:var(--line-dark);border:1px solid var(--line-dark)}
.context-block{background:#090909;padding:clamp(1.5rem,3vw,3rem)}
.context-block h3{font-size:clamp(1.25rem,2vw,2rem);line-height:1.3;margin:.75rem 0 1.25rem}
.context-block .body-copy{font-size:.94rem;line-height:1.9}
.concept-visuals{display:grid;grid-template-columns:1.15fr .85fr;gap:1px;background:var(--line-dark);border:1px solid var(--line-dark);margin-top:1px}
.concept-visuals figure{margin:0;background:#f3f3f3;min-height:clamp(260px,38vw,580px);overflow:hidden}
.concept-visuals img{width:100%;height:100%;object-fit:contain}

/* series */
.series{padding:clamp(6rem,10vw,10rem) 0;background:var(--paper)}
.series .shell{width:min(100%,1840px)}
.series-title{max-width:14ch}
.work-tabs{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));border:1px solid var(--line);background:var(--line);gap:1px}
.work-tab{appearance:none;border:0;background:var(--paper);padding:0;text-align:left;cursor:pointer;min-width:0;transition:background .25s,color .25s}
.work-tab-inner{display:flex;flex-direction:column;min-height:clamp(260px,30vw,470px)}
.work-tab-media{position:relative;aspect-ratio:5/6;overflow:hidden;background:var(--paper-2)}
.work-tab-media img{width:100%;height:100%;object-fit:cover;object-position:top;filter:grayscale(1);opacity:.72;transition:filter .35s,opacity .35s,transform .55s cubic-bezier(.2,.65,.2,1)}
.work-tab:hover .work-tab-media img,.work-tab[aria-selected="true"] .work-tab-media img{filter:grayscale(0);opacity:1;transform:scale(1.025)}
.work-tab-copy{padding:1rem;display:flex;flex-direction:column;gap:.7rem;flex:1;border-top:1px solid var(--line)}
.work-tab-no{font:700 9px/1 var(--mono);letter-spacing:.16em;color:var(--signal)}
.work-tab .work-name{font-size:clamp(.95rem,1.4vw,1.4rem);line-height:1.45;margin:0}
.work-tab-meta{font:700 8px/1.5 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:auto}
.work-tab[aria-selected="true"]{background:var(--ink);color:#fff}
.work-tab[aria-selected="true"] .work-tab-copy{border-color:var(--line-dark)}
.work-tab[aria-selected="true"] .work-tab-meta{color:rgba(255,255,255,.55)}
.work-detail{border:1px solid var(--line);border-top:0;background:var(--paper)}
.detail-top{display:flex;justify-content:space-between;align-items:center;gap:1.5rem;padding:1rem clamp(1rem,2vw,2rem);border-bottom:1px solid var(--line)}
.detail-id{display:flex;align-items:baseline;gap:1rem;min-width:0}
.detail-no{font:700 10px/1 var(--mono);letter-spacing:.16em;color:var(--signal)}
.detail-name{margin:0;font-size:clamp(1rem,1.7vw,1.5rem);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-actions{display:flex;align-items:center;gap:1.4rem;flex-shrink:0}
.detail-interaction{font:700 8px/1.4 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.ar-link{display:inline-flex;align-items:center;gap:.7rem;background:var(--ink);color:#fff;text-decoration:none;padding:.72rem 1rem;font:700 9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;transition:background .2s,color .2s}
.ar-link::before{content:"AR";color:#8fa2ff}
.ar-link:hover{background:var(--signal)}
.detail-main{display:grid;grid-template-columns:minmax(300px,.82fr) minmax(0,1.18fr);min-height:clamp(520px,64vw,880px)}
.detail-image{margin:0;background:var(--paper-2);border-right:1px solid var(--line);min-height:0;overflow:hidden}
.detail-image img{width:100%;height:100%;object-fit:contain;object-position:center}
.detail-voice{display:flex;flex-direction:column;justify-content:center;padding:clamp(2rem,5vw,6rem)}
.voice-label{font:700 9px/1.4 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--signal);margin-bottom:clamp(1.5rem,3vw,3rem)}
.voice-copy{white-space:pre-line;font-size:clamp(1.5rem,3.15vw,4rem);line-height:1.5;letter-spacing:-.015em;margin:0;text-wrap:balance}
.detail-meaning{display:grid;grid-template-columns:minmax(10rem,.32fr) minmax(0,1fr);gap:clamp(2rem,5vw,6rem);padding:clamp(2rem,4vw,4rem);border-top:1px solid var(--line)}
.meaning-label{font:700 9px/1.5 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.meaning-copy{max-width:64rem;margin:0}
.series-mobile{display:none}

/* mobile sequential works */
.mobile-work{border-top:1px solid var(--line)}
.mobile-work:last-child{border-bottom:1px solid var(--line)}
.mobile-work summary{list-style:none;cursor:pointer;padding:1.15rem 0;display:grid;grid-template-columns:3.3rem 1fr auto;gap:1rem;align-items:center}
.mobile-work summary::-webkit-details-marker{display:none}
.mobile-work summary::after{content:"+";font:400 20px/1 var(--mono);transition:transform .2s}
.mobile-work[open] summary::after{transform:rotate(45deg)}
.mobile-work-no{font:700 9px/1 var(--mono);letter-spacing:.12em;color:var(--signal)}
.mobile-work-summary .mobile-title{display:block;font-size:1.05rem;line-height:1.45}
.mobile-work-summary>span:last-child{display:block;font:700 8px/1.5 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:.35rem}
.mobile-work-body{padding:0 0 3.5rem}
.mobile-work-image{margin:0;background:var(--paper-2);border:1px solid var(--line)}
.mobile-work-image img{width:100%;height:auto;max-height:72svh;object-fit:contain}
.mobile-voice{padding:2.4rem 0}
.mobile-voice .voice-copy{font-size:clamp(1.45rem,7vw,2.45rem);line-height:1.55}
.mobile-meaning{border-top:1px solid var(--line);padding-top:1.4rem}
.mobile-meaning .body-copy{font-size:1rem}
.mobile-actions{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-top:1.8rem}

/* film and footer */
.film{min-height:100svh;background:#000;color:#fff;display:flex;flex-direction:column}
.film-head{display:flex;align-items:end;justify-content:space-between;gap:2rem;padding:clamp(1.4rem,3vw,3rem) var(--page-pad);border-bottom:1px solid var(--line-dark)}
.film .eyebrow{color:rgba(255,255,255,.48)}
.film-title{font-size:clamp(2rem,4vw,4.6rem);line-height:1;margin:.55rem 0 0}
.film-note{max-width:32rem;margin:0;color:rgba(255,255,255,.55);font-size:.9rem;line-height:1.7}
.film-frame{flex:1;min-height:clamp(420px,72svh,920px);position:relative;background:#000}
.film-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.footer{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:2rem var(--page-pad);background:var(--paper);border-top:1px solid var(--line)}
.footer-back{display:inline-flex;align-items:center;gap:.8rem;text-decoration:none;font:700 10px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase}
.footer-back span:first-child{font-size:16px;transition:transform .2s}
.footer-back:hover span:first-child{transform:translateX(-4px)}
.footer-meta{font:700 8px/1.5 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

@media(max-width:1100px){
  .hero{grid-template-columns:52% 48%}
  .hero-title{font-size:clamp(3.8rem,8vw,6.8rem)}
  .overview{margin-top:2.5rem}
  .hero-specs{grid-template-columns:1fr;gap:.65rem;margin-top:2rem}
  .hero-spec{display:grid;grid-template-columns:7rem 1fr;border-top:1px solid var(--line);padding:.65rem 0 0}
  .hero-spec+.hero-spec{padding-left:0;border-left:0}
  .relation-axis{margin-top:2rem}
  .detail-main{grid-template-columns:.72fr 1.28fr}
}
@media(max-width:900px){
  :root{--nav-h:54px;--page-pad:clamp(1rem,5vw,2rem)}
  .site-nav{color:var(--ink);background:rgba(255,255,255,.94);border-color:var(--line)}
  .hero{display:block;background:var(--paper)}
  .hero-media{min-height:52svh;height:52svh;border-right:0;border-bottom:1px solid var(--line)}
  .hero-copy{min-height:auto;padding:clamp(2.6rem,8vw,5rem) var(--page-pad) clamp(3.5rem,10vw,6rem)}
  .hero-kicker{margin-top:0}
  .hero-title{font-size:clamp(4rem,18vw,7rem);margin:2.2rem 0 .75rem}
  .overview-title{max-width:25ch}
  .hero-specs{margin-top:2.5rem}
  .scroll-cue{display:none}
  .section-head{grid-template-columns:1fr;gap:1.4rem}
  .section-title{max-width:15ch}
  .section-intro{max-width:44rem}
  .research-grid{grid-template-columns:1fr;gap:3rem}
  .research-copy{position:static}
  .research-title{max-width:13ch}
  .atlas{grid-template-columns:1fr;grid-template-rows:auto;background:transparent;border:0;gap:1px}
  .atlas-figure:first-child{grid-row:auto;min-height:62svh;border:1px solid var(--line)}
  .atlas> .atlas-figure:nth-child(2){min-height:42svh;border:1px solid var(--line)}
  .atlas-pair{min-height:42svh;border:1px solid var(--line)}
  .concept-intro,.concept-context{grid-template-columns:1fr}
  .concept-visuals{grid-template-columns:1fr}
  .concept-visuals figure{min-height:44svh}
  .absurdity-item{grid-template-columns:2.5rem 1fr auto}
  .series-desktop{display:none}
  .series-mobile{display:block}
  .series .section-head{margin-bottom:2.2rem}
  .film-head{align-items:start;flex-direction:column}
  .film-note{max-width:42rem}
  .film-frame{min-height:72svh}
}
@media(max-width:560px){
  .nav-left{gap:.8rem}
  .nav-title{font-size:12px}
  .lang-code{display:none}
  .hero-media{height:44svh;min-height:44svh}
  .hero-kicker{display:block}
  .hero-kicker .eyebrow+.eyebrow{margin-top:.45rem}
  .ar-premise{grid-template-columns:2.5rem 1fr}
  .hero-spec{grid-template-columns:6rem 1fr}
  .atlas-pair{grid-template-columns:1fr;min-height:auto}
  .atlas-pair .atlas-figure{height:42svh}
  .concept-thesis{font-size:clamp(1.7rem,8vw,2.7rem)}
  .absurdity-item .mark{display:none}
  .absurdity-item{grid-template-columns:2.2rem 1fr}
  .context-block{padding:1.4rem}
  .mobile-actions{align-items:flex-start;flex-direction:column}
  .film-frame{min-height:64svh}
  .footer{align-items:flex-start;flex-direction:column}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}
</style>
</head>

const LANGS = ["ja","zh","en"];
let lang = "ja";
let activeWork = 0;
try {
  const saved = localStorage.getItem("hl-lang");
  if (LANGS.includes(saved)) lang = saved;
} catch(e) {}

const copyNodes = [...document.querySelectorAll("[data-copy]")];
const langButton = document.getElementById("lang-button");
const langCode = document.getElementById("lang-code");
const workTabs = document.getElementById("work-tabs");
const workDetail = document.getElementById("work-detail");
const mobileSeries = document.getElementById("series-mobile");

function escapeHTML(value){
  return String(value).replace(/[&<>'"]/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[char]));
}

function workImageAlt(work){
  if(lang === "ja") return `${work.name}を配置した${work.no}の展示・AR記録`;
  if(lang === "zh") return `${work.no}中${work.name}的展示与AR记录`;
  return `${work.no}, an installation and AR view of ${work.name}`;
}

function desktopDetailMarkup(work,index){
  const c = CONTENT[lang];
  return `
    <div class="detail-top">
      <div class="detail-id"><span class="detail-no">${escapeHTML(work.no)}</span><h3 class="detail-name work-name">${escapeHTML(work.name)}</h3></div>
      <div class="detail-actions"><span class="detail-interaction">${escapeHTML(work.interaction)}</span><a class="ar-link" href="${escapeHTML(work.ar)}" rel="ar">${escapeHTML(c.viewAR)}</a></div>
    </div>
    <div class="detail-main">
      <figure class="detail-image"><img src="${escapeHTML(work.image)}" alt="${escapeHTML(workImageAlt(work))}" loading="lazy"></figure>
      <div class="detail-voice"><span class="voice-label">${escapeHTML(work.voiceLabel)}</span><blockquote class="voice-copy">${escapeHTML(work.voice)}</blockquote></div>
    </div>
    <div class="detail-meaning"><span class="meaning-label">${escapeHTML(c.meaningLabel)}</span><p class="meaning-copy body-copy">${escapeHTML(work.description)}</p></div>`;
}

function renderDesktopWorks(){
  const c = CONTENT[lang];
  workTabs.setAttribute("aria-label", c.seriesTitle);
  workTabs.innerHTML = c.works.map((work,index) => `
    <button class="work-tab" id="work-tab-${index}" type="button" role="tab" aria-selected="${index === activeWork}" aria-controls="work-detail" tabindex="${index === activeWork ? 0 : -1}" data-index="${index}">
      <span class="work-tab-inner">
        <span class="work-tab-media"><img src="${escapeHTML(work.image)}" alt="" loading="lazy"></span>
        <span class="work-tab-copy"><span class="work-tab-no">${escapeHTML(work.no)}</span><span class="work-name">${escapeHTML(work.name)}</span><span class="work-tab-meta">${escapeHTML(work.interaction)}</span></span>
      </span>
    </button>`).join("");
  const work = c.works[activeWork];
  workDetail.setAttribute("aria-labelledby", `work-tab-${activeWork}`);
  workDetail.innerHTML = desktopDetailMarkup(work,activeWork);
}

function renderMobileWorks(){
  const c = CONTENT[lang];

      <summary>
        <span class="mobile-work-no">${escapeHTML(work.no)}</span>
        <span class="mobile-work-summary"><span class="mobile-title work-name">${escapeHTML(work.name)}</span><span>${escapeHTML(work.interaction)}</span></span>

      <div class="mobile-work-body">

}

  lang = LANGS.includes(nextLang) ? nextLang : "ja";
  const c = CONTENT[lang];
  document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
  document.documentElement.className = `lang-${lang}`;
  document.title = `${c.title} — 何梁宇`;
  document.querySelector('meta[name="description"]').content = c.metaDescription;
  copyNodes.forEach(node => {
    const key = node.dataset.copy;
    if(c[key] !== undefined) node.textContent = c[key];
  });
  langCode.textContent = lang.toUpperCase();
  langButton.setAttribute("aria-label", c.langLabel);
  langButton.title = c.langLabel;
  document.getElementById("film-player").title = c.filmIframeTitle;
  setImageAlts(c);
  renderDesktopWorks();
  renderMobileWorks();
  try { localStorage.setItem("hl-lang",lang); } catch(e) {}
}

function selectWork(index,focusTab=false){
  const works = CONTENT[lang].works;
  activeWork = Math.max(0,Math.min(index,works.length-1));
  renderDesktopWorks();
  renderMobileWorks();
  if(focusTab) document.getElementById(`work-tab-${activeWork}`)?.focus();
}

workTabs.addEventListener("click",event => {
  const button = event.target.closest(".work-tab");
  if(button) selectWork(Number(button.dataset.index));
});

workTabs.addEventListener("keydown",event => {
  const button = event.target.closest(".work-tab");
  if(!button) return;
  let next = activeWork;
  if(event.key === "ArrowRight") next = (activeWork + 1) % CONTENT[lang].works.length;
  else if(event.key === "ArrowLeft") next = (activeWork - 1 + CONTENT[lang].works.length) % CONTENT[lang].works.length;
  else if(event.key === "Home") next = 0;
  else if(event.key === "End") next = CONTENT[lang].works.length - 1;
  else return;
  event.preventDefault();
  selectWork(next,true);
});

mobileSeries.addEventListener("click",event => {
  const summary = event.target.closest("summary");
  if(summary) activeWork = Number(summary.parentElement.dataset.index);
});

langButton.addEventListener("click",() => {
  const next = LANGS[(LANGS.indexOf(lang)+1)%LANGS.length];
  applyLanguage(next);
});

const nav = document.getElementById("site-nav");
function updateNav(){ nav.classList.toggle("solid",window.scrollY > Math.min(120,window.innerHeight*.12)); }
window.addEventListener("scroll",updateNav,{passive:true});
updateNav();
applyLanguage(lang);
</script>
</body>
</html>
