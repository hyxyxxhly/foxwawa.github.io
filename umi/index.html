<!DOCTYPE html>
<html lang="ja" class="lang-ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>海 — 何梁宇</title>
<meta name="description" content="海 / Sea — 何梁宇。故郷の黄色い海の記憶をめぐる新メディア作品。美とは記憶と感情の重なりである。">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Serif+JP:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light}
:root{
  --sand:#f4eee3;
  --sand2:#ebe2d3;
  --paper:#faf6ee;
  --ink:#2a251f;
  --ink2:#6a6155;
  --faint:#a99f8d;
  --blue:#3d72c7;
  --blue-deep:#284f92;
  --amber:#dd922c;
  --amber-soft:#efb457;
  --rule:rgba(42,37,31,.14);
  --rule2:rgba(42,37,31,.08);
  --mono:"Space Mono",monospace;
  --maxw:1160px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  background:var(--sand);color:var(--ink);
  font-family:var(--mono);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--amber);color:#2a251f}

/* ── serif display per lang ── */
.serif{font-family:"Newsreader",serif}
.lang-ja .serif{font-family:"Noto Serif JP",serif;font-weight:400}
.lang-zh .serif{font-family:"Noto Serif SC",serif;font-weight:500}
/* body text */
.body-t{font-family:"Newsreader",serif;font-size:15px;line-height:1.95;color:var(--ink2)}
.lang-ja .body-t{font-family:"Noto Serif JP",serif;font-size:15px;line-height:1.95}
.lang-zh .body-t{font-family:"Noto Serif SC",serif;font-size:15px;line-height:1.95}
.body-t + .body-t{margin-top:1rem}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:80;height:58px;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1.1rem,4vw,2.8rem);transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
#nav.solid{background:rgba(244,238,227,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom-color:var(--rule)}
.nav-l{display:flex;align-items:center;gap:1.4rem;min-width:0}
.nav-back{font-size:15px;color:var(--ink2);transition:color .2s,transform .2s;flex-shrink:0}
.nav-back:hover{color:var(--amber);transform:translateX(-3px)}
.nav-ttl{font-size:12px;letter-spacing:.5px;color:var(--ink);font-weight:700}
.lang-ja .nav-ttl{font-family:"Noto Serif JP",serif}
.lang-zh .nav-ttl{font-family:"Noto Serif SC",serif}
.lang-globe{background:none;border:none;cursor:pointer;padding:6px;color:var(--ink);opacity:.5;display:flex;transition:opacity .2s,color .2s;-webkit-tap-highlight-color:transparent}
.lang-globe:hover{opacity:1;color:var(--amber)}

/* ── shared ── */
.wrap{max-width:var(--maxw);margin:0 auto;padding-left:clamp(1.1rem,4vw,2.8rem);padding-right:clamp(1.1rem,4vw,2.8rem)}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);font-weight:700;display:inline-flex;align-items:center;gap:.6rem}
.kicker::before{content:"";width:24px;height:1px;background:var(--amber-soft)}
.sec-kicker{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink2);font-weight:700;margin-bottom:2rem;display:flex;align-items:center;gap:.7rem}
.sec-kicker span{color:var(--amber)}
.sec-kicker .sep{color:var(--faint)}
section{position:relative}

/* ── HERO ── */
.hero{position:relative;height:100vh;min-height:580px;overflow:hidden;display:flex;align-items:flex-end}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;object-position:center 42%}
.hero-shade{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(244,238,227,0) 40%,rgba(244,238,227,.5) 72%,rgba(244,238,227,.94) 100%)}
.hero-inner{position:relative;z-index:2;width:100%;max-width:var(--maxw);margin:0 auto;padding:0 clamp(1.1rem,4vw,2.8rem) clamp(3rem,7vh,5rem)}
.hero-ttl{font-family:"Newsreader",serif;font-weight:400;font-size:clamp(3.2rem,11vw,8.5rem);line-height:.88;letter-spacing:-.01em;color:var(--ink)}
.lang-ja .hero-ttl{font-family:"Noto Serif JP",serif;font-weight:300}
.lang-zh .hero-ttl{font-family:"Noto Serif SC",serif;font-weight:500}
.hero-kick{margin-bottom:1.6rem}
.hero-sub{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink2);margin-top:1.2rem;font-weight:700}
.hero-scroll{position:absolute;left:50%;bottom:1.4rem;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:.55rem;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink2)}
.hero-scroll .dn{width:1px;height:32px;background:linear-gradient(var(--amber),transparent);animation:sweep 2.2s ease-in-out infinite}
@keyframes sweep{0%,100%{opacity:.25;transform:scaleY(.7)}50%{opacity:1;transform:scaleY(1)}}

/* ── CONCEPT ── */
.concept{padding:clamp(4.5rem,12vh,8.5rem) 0}
.concept-grid{display:grid;grid-template-columns:1fr;gap:clamp(2rem,5vw,4rem)}
@media(min-width:860px){.concept-grid{grid-template-columns:auto 1fr;align-items:start}}
.gradbar{width:100%;height:8px;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--amber));transition:filter .5s ease,box-shadow .5s ease,opacity .5s ease}
@media(min-width:860px){.gradbar{width:8px;height:auto;min-height:280px;align-self:stretch;border-radius:4px;background:linear-gradient(180deg,var(--blue),var(--amber));transform-origin:top}}
.concept-grid:has(.insp.is-open) .gradbar{filter:saturate(1.12);box-shadow:0 12px 28px -12px rgba(61,114,199,.4);opacity:1}
.concept-lead{font-size:clamp(1.5rem,3.4vw,2.8rem);line-height:1.32;letter-spacing:-.01em;color:var(--ink);max-width:18em}
.concept-body{margin-top:1.8rem;max-width:40em}
.spec-row{display:flex;flex-wrap:wrap;gap:2.4rem;margin-top:2.6rem;padding-top:1.6rem;border-top:1px solid var(--rule)}
.spec-k{display:block;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink2);margin-bottom:.5rem;font-weight:700}
.spec-v{font-size:14px;color:var(--ink);font-weight:700;font-family:var(--mono)}
.insp{margin-top:2.4rem;padding-top:.4rem;border-top:1px solid var(--rule);max-width:44em}
.insp summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:.7rem;padding:1.2rem 0;font-family:var(--mono);font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink2);font-weight:700;transition:color .3s ease}
.insp summary::-webkit-details-marker{display:none}
.insp summary::before{content:"+";font-size:15px;color:var(--amber);transition:transform .45s cubic-bezier(.22,.74,.25,1);line-height:1}
.insp.is-open summary::before{transform:rotate(45deg)}
.insp.is-open summary{color:var(--ink)}
.insp summary:hover{color:var(--ink)}
.insp-body{display:grid;grid-template-rows:0fr;overflow:hidden;transition:grid-template-rows .52s cubic-bezier(.22,.74,.25,1)}
.insp-copy{min-height:0;overflow:hidden;padding:0;opacity:0;visibility:hidden;transform:translateY(-10px);transition:opacity .28s ease,transform .46s cubic-bezier(.22,.74,.25,1),padding .46s cubic-bezier(.22,.74,.25,1),visibility 0s linear .52s}
.insp.is-open .insp-body{grid-template-rows:1fr}
.insp.is-open .insp-copy{padding:.2rem 0 1.4rem;opacity:1;visibility:visible;transform:translateY(0);transition-delay:.08s,.04s,0s,0s}
.insp-body p{font-family:"Newsreader",serif;font-style:italic;font-size:16.5px;line-height:1.9;color:var(--ink2)}
.lang-ja .insp-body p{font-family:"Noto Serif JP",serif;font-style:normal}
.lang-zh .insp-body p{font-family:"Noto Serif SC",serif;font-style:normal}
.insp-body p+p{margin-top:.9rem}

/* ── YELLOW SEA (background) ── */
.yellow{padding:clamp(4rem,10vh,7rem) 0;background:linear-gradient(180deg,var(--sand),var(--paper) 60%,var(--sand));border-top:1px solid var(--rule2)}
.yellow-grid{display:grid;grid-template-columns:1fr;gap:clamp(1.4rem,4vw,3rem);align-items:start}
@media(min-width:860px){.yellow-grid{grid-template-columns:minmax(0,.95fr) minmax(0,1.05fr)}}
.yellow-head{font-size:clamp(1.4rem,3vw,2.1rem);line-height:1.4;color:var(--ink);max-width:15em}
.yellow-head .fig{color:var(--blue)}
.yellow-text{max-width:40em}

/* ── TRAVEL / SURVEY ── */
.travel{padding:clamp(4rem,10vh,7rem) 0;border-top:1px solid var(--rule2)}
.travel-head{font-size:clamp(1.4rem,3vw,2.1rem);line-height:1.35;color:var(--ink);margin-bottom:1.4rem;max-width:18em}
.travel-body{max-width:42em}
/* ── COVER FLOW (classic iTunes) ── */
.coverflow{position:relative;width:100vw;margin:0 0 0 calc(50% - 50vw);height:clamp(464px,calc(43vw + 4rem),684px);
  touch-action:pan-y;overscroll-behavior-x:contain;user-select:none;-webkit-user-select:none;cursor:grab;isolation:isolate;outline:none;overflow:hidden}
.coverflow::before{content:"";position:absolute;z-index:0;left:12%;right:12%;top:53%;height:28%;border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(42,37,31,.17),rgba(42,37,31,.055) 42%,transparent 72%);filter:blur(22px);pointer-events:none}
.coverflow::after{content:"";position:absolute;z-index:2;left:8%;right:8%;bottom:12%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(42,37,31,.11) 25%,rgba(42,37,31,.11) 75%,transparent);pointer-events:none}
.coverflow.is-dragging{cursor:grabbing}
.cf-stage{position:relative;z-index:1;width:100%;height:100%}
.cf-item{position:absolute;top:43%;left:50%;width:clamp(320px,44vw,760px);
  transform:translate(-50%,-50%);transition:transform .56s cubic-bezier(.22,.74,.25,1),filter .48s ease,opacity .36s ease;
  cursor:pointer;will-change:transform,opacity,filter;backface-visibility:hidden;-webkit-backface-visibility:hidden;-webkit-tap-highlight-color:transparent}
.coverflow.is-dragging .cf-item,.coverflow.is-animating .cf-item{transition:filter .32s ease}
.coverflow.is-initializing .cf-item{transition:none}
.cf-card{position:relative;width:100%;line-height:0;background:#d8d0c2;border:1px solid rgba(255,255,255,.42);
  box-shadow:0 22px 42px -20px rgba(42,37,31,.55);transition:box-shadow .45s ease}
.cf-card::after{content:"";position:absolute;inset:0;border:1px solid rgba(42,37,31,.1);box-shadow:inset 0 1px rgba(255,255,255,.38);pointer-events:none}
.cf-card>img{width:100%;height:auto;display:block}
.cf-item:not(.active){filter:brightness(.66) saturate(.72) contrast(.96)}
.cf-item.active{filter:brightness(1) saturate(1)}
.cf-item.active .cf-card{box-shadow:0 35px 58px -22px rgba(42,37,31,.62)}
.cf-item:focus-visible .cf-card{outline:2px solid var(--amber);outline-offset:5px}
.cf-status{position:absolute;z-index:5;left:50%;bottom:5%;display:flex;align-items:center;gap:.55rem;transform:translateX(-50%);
  font-family:var(--mono);font-size:9px;line-height:1;letter-spacing:2px;color:var(--faint);pointer-events:none}
.cf-status .current{color:var(--ink);font-weight:700}
.cf-status .slash{color:var(--amber)}
.car-dots{display:flex;gap:9px;justify-content:center;margin-top:.65rem;flex-wrap:wrap}
.car-dot{width:7px;height:7px;border-radius:50%;background:var(--rule);border:none;cursor:pointer;padding:0;transition:background .2s,transform .2s}
.car-dot.on{background:var(--amber);transform:scale(1.35)}
.insights{display:grid;grid-template-columns:1fr;gap:1px;margin:3.4rem 0 0;background:var(--rule);border:1px solid var(--rule)}
@media(min-width:760px){.insights{grid-template-columns:repeat(3,1fr)}}
.insight{background:var(--sand);padding:2rem 1.8rem;display:flex;flex-direction:column;gap:1rem}
.insight .no{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--amber);font-weight:700}
.insight .q{font-family:"Newsreader",serif;font-size:clamp(1.15rem,1.8vw,1.5rem);line-height:1.4;color:var(--ink)}
.lang-ja .insight .q{font-family:"Noto Serif JP",serif}
.lang-zh .insight .q{font-family:"Noto Serif SC",serif}

/* ── VISUAL CONCEPT ── */
.visual{position:relative;overflow:hidden;padding:clamp(4rem,10vh,7rem) 0;border-top:1px solid var(--rule2)}
.visual-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.visual-bg .grad{position:absolute;inset:-4%;background:linear-gradient(180deg,var(--blue) 0%,#7f8ec2 38%,var(--amber-soft) 66%,var(--amber) 100%);background-size:100% 260%;animation:weather 18s ease-in-out infinite alternate}
.visual-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(250,246,238,.74),rgba(250,246,238,.6) 45%,rgba(250,246,238,.8))}
@keyframes weather{0%{background-position:50% 0%}100%{background-position:50% 100%}}
.visual>.wrap{position:relative;z-index:1}
.visual-intro{max-width:44em}
.visual-head{font-size:clamp(1.5rem,3.4vw,2.4rem);line-height:1.3;color:var(--ink);margin:.6rem 0 1.4rem}
.mat-lbl{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);font-weight:700;margin-top:1.8rem;margin-bottom:.9rem}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--rule);color:var(--ink2);background:var(--sand)}
.concept-diagram{margin:clamp(2.5rem,5vw,4rem) 0 0;border:1px solid var(--rule);background:#fff;overflow:hidden;box-shadow:0 28px 66px -30px rgba(42,37,31,.42)}
.concept-diagram img{width:100%;height:auto;display:block;padding:clamp(1.4rem,3.5vw,2.6rem)}
.concept-diagram figcaption{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);padding:.9rem 1.2rem;border-top:1px solid var(--rule);line-height:1.5}
.evo{display:grid;grid-template-columns:1fr;gap:16px;margin-top:clamp(2rem,4vw,3rem)}
@media(min-width:680px){.evo{grid-template-columns:1fr 1fr}}
.evo figure{border:1px solid var(--rule);background:var(--sand);overflow:hidden;box-shadow:0 20px 48px -24px rgba(42,37,31,.45)}
.evo img{width:100%;height:auto;display:block}

/* ── EXHIBITION ── */
.exhibition{padding:clamp(4rem,10vh,7rem) 0;border-top:1px solid var(--rule2)}
.exh-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:.5rem}
@media(min-width:680px){.exh-grid{grid-template-columns:1fr 1fr}}
.exh-c{border:1px solid var(--rule);background:var(--paper);overflow:hidden;cursor:zoom-in;position:relative;box-shadow:0 16px 40px -24px rgba(42,37,31,.35)}
.exh-c img{width:100%;height:auto;display:block;transition:transform .5s cubic-bezier(.2,.6,.2,1)}
.exh-c:hover img{transform:scale(1.03)}

/* ── FILM ── */
.film{padding:clamp(4rem,10vh,7rem) 0 0;border-top:1px solid var(--rule2);background:var(--paper);overflow:hidden}
.film>.wrap{max-width:none;padding-left:0;padding-right:0}
.film>.wrap>.sec-kicker{max-width:var(--maxw);margin-left:auto;margin-right:auto;padding-left:clamp(1.1rem,4vw,2.8rem);padding-right:clamp(1.1rem,4vw,2.8rem)}
.film-frame{margin:0;width:100vw;max-width:none;height:56.25vw;height:min(100svh,56.25vw);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);background:#000;overflow:hidden;position:relative}
.film-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

/* ── FOOTER ── */
.foot{border-top:1px solid var(--rule);padding:clamp(3rem,7vh,5rem) 0}
.foot .wrap{display:flex;flex-wrap:wrap;gap:1.4rem;align-items:center;justify-content:space-between}
.foot-back{display:inline-flex;align-items:center;gap:.7rem;font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--ink);font-weight:700;transition:gap .2s,color .2s}
.foot-back:hover{gap:1.1rem;color:var(--amber)}
.foot-meta{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)}

/* ── LIGHTBOX ── */
#lb{display:none;position:fixed;inset:0;z-index:200;background:rgba(28,24,19,.94);align-items:center;justify-content:center;cursor:zoom-out;padding:3vh 3vw}
#lb.open{display:flex}
#lb-x{position:absolute;top:16px;right:22px;font-size:22px;color:rgba(255,255,255,.6);cursor:pointer;font-family:var(--mono)}
#lb-x:hover{color:#fff}
#lb-img{max-width:94vw;max-height:94vh;object-fit:contain}

@media(prefers-reduced-motion:reduce){
  *{scroll-behavior:auto!important}
  .hero-scroll .dn,.visual-bg .grad{animation:none}
  .cf-item{transition:none}
  .insp-body,.insp-copy,.insp summary::before,.gradbar{transition:none}
}
@media(max-width:600px){
  .body-t{font-size:15px}
  .lang-zh .body-t,.lang-ja .body-t{font-size:15px}
  .coverflow{height:330px;margin-top:2.6rem}
  .cf-item{top:43%;width:clamp(245px,76vw,330px)}
  .cf-status{bottom:2%}
}
</style>
</head>
<body>

<div id="lb"><span id="lb-x">&#10005;</span><img id="lb-img" src="" alt=""></div>

<nav id="nav">
  <div class="nav-l">
    <a class="nav-back" href="../index.html" aria-label="Back">&#8592;</a>
    <span class="nav-ttl" id="nav-ttl">海</span>
  </div>
  <button class="lang-globe" id="lang-cycle-btn" aria-label="Switch language">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.2"/>
      <ellipse cx="10" cy="10" rx="4" ry="8.5" stroke="currentColor" stroke-width="1.2"/>
      <line x1="1.5" y1="7.5" x2="18.5" y2="7.5" stroke="currentColor" stroke-width="1.2"/>
      <line x1="1.5" y1="12.5" x2="18.5" y2="12.5" stroke="currentColor" stroke-width="1.2"/>
    </svg>
  </button>
</nav>

<main id="page">

<!-- ══ HERO ══ -->
<header class="hero">
  <div class="hero-bg"><img src="hero.jpg" alt="海" onerror="this.closest('.hero-bg').style.background='linear-gradient(180deg,#3d72c7,#dd922c)'"></div>
  <div class="hero-shade"></div>
  <div class="hero-inner">
    <p class="kicker hero-kick"><span id="h-cat">新メディア</span>&nbsp;·&nbsp;2023</p>
    <h1 class="hero-ttl" id="h-ttl">海</h1>
    <p class="hero-sub" id="h-sub">UMI / 海</p>
  </div>
  <div class="hero-scroll"><span class="dn"></span><span id="h-scroll">上下スクロールで移動</span></div>
</header>

<!-- ══ CONCEPT ══ -->
<section class="concept"><div class="wrap">
  <p class="kicker" id="c-lbl">概念 / Concept</p>
  <div class="concept-grid" style="margin-top:1.6rem">
    <div class="gradbar" aria-hidden="true"></div>
    <div>
      <h2 class="concept-lead serif" id="c1-head">自然の景観と記憶が結ぶ、主観的な美しさ</h2>
      <div class="concept-body">
        <p class="body-t" id="c1-p1"></p>
        <p class="body-t" id="c1-p2"></p>
      </div>
      <details class="insp">
        <summary class="insp-sum" id="ins-sum">インスピレーション</summary>
        <div class="insp-body">
          <div class="insp-copy">
            <p id="c2-p1"></p>
            <p id="c2-p2"></p>
          </div>
        </div>
      </details>
    </div>
  </div>
  <div class="spec-row">
    <div><span class="spec-k" id="h-yl">制作年</span><span class="spec-v">2023.10</span></div>
    <div><span class="spec-k" id="h-ml">使用ツール</span><span class="spec-v" id="h-med">Cinema 4D / Final Cut Pro</span></div>
    <div><span class="spec-k" id="h-tl">種別</span><span class="spec-v" id="h-type">新メディア</span></div>
  </div>
</div></section>

/* smooth inspiration disclosure — keep details open until closing finishes */
(function initInspirationDisclosure(){
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  document.querySelectorAll("details.insp").forEach(details => {
    const summary = details.querySelector("summary");
    const body = details.querySelector(".insp-body");
    if (!summary || !body) return;

    let closeTimer = 0;
    let motionToken = 0;
    const setExpanded = value => summary.setAttribute("aria-expanded", String(value));
    const finishClose = token => {
      if (token !== motionToken || details.classList.contains("is-open")) return;
      details.open = false;
      details.classList.remove("is-closing");
    };

    if (details.open) details.classList.add("is-open");
    setExpanded(details.open);

    summary.addEventListener("click", event => {
      event.preventDefault();
      const token = ++motionToken;
      window.clearTimeout(closeTimer);

      if (!details.classList.contains("is-open")) {
        details.open = true;
        details.classList.remove("is-closing");
        setExpanded(true);
        if (reduce) {
          details.classList.add("is-open");
          return;
        }
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (token === motionToken) details.classList.add("is-open");
        }));
        return;
      }

      details.classList.remove("is-open");
      details.classList.add("is-closing");
      setExpanded(false);
      if (reduce) {
        finishClose(token);
        return;
      }
      closeTimer = window.setTimeout(() => finishClose(token), 580);
    });

    body.addEventListener("transitionend", event => {
      if (event.propertyName === "grid-template-rows" && details.classList.contains("is-closing")) {
        finishClose(motionToken);
      }
    });
  });
})();

/* nav solidify on scroll */
const navEl = document.getElementById("nav");
const onScroll = () => navEl.classList.toggle("solid", window.scrollY > window.innerHeight * 0.7);
window.addEventListener("scroll", onScroll, { passive:true });
onScroll();

/* lightbox for gallery images */
const lb = document.getElementById("lb"), lbi = document.getElementById("lb-img");
const closeLB = () => { lb.classList.remove("open"); document.body.style.overflow = ""; };
document.getElementById("lb-x").addEventListener("click", closeLB);
lb.addEventListener("click", e => { if (e.target === lb || e.target === lbi) closeLB(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLB(); });
document.querySelectorAll(".exh-c img, .evo img, .concept-diagram img").forEach(img => {
  img.style.cursor = "zoom-in";
  img.addEventListener("click", () => { lbi.src = img.src; lb.classList.add("open"); document.body.style.overflow = "hidden"; });
});

/* travel — continuous iTunes-style Cover Flow */
(function initCoverflow(){
  const cf = document.getElementById("cf");
  const stage = document.getElementById("cf-stage");
  const dotsWrap = document.getElementById("travel-dots");
  const currentEl = document.getElementById("cf-current");
  const totalEl = document.getElementById("cf-total");
  if (!cf || !stage || !dotsWrap) return;

  const items = [...stage.children];
  const n = items.length;
  if (!n) return;

  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const pad = v => String(v).padStart(2, "0");
  let position = Math.floor((n - 1) / 2);
  let active = Math.round(position);
  let dragged = false;
  let pointerId = null;
  let startX = 0;
  let startPosition = position;
  let lastX = 0;
  let lastTime = 0;
  let velocity = 0;
  let renderFrame = 0;
  let snapFrame = 0;
  let wheelTimer = 0;
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

  totalEl.textContent = pad(n);

  items.forEach((it, i) => {
    const img = it.querySelector("img");
    it.setAttribute("role", "button");
    it.setAttribute("aria-roledescription", "slide");
    it.setAttribute("aria-label", `Travel photograph ${i + 1} of ${n}`);
    if (img) {
      img.alt = `Travel photograph ${i + 1} of ${n}`;
      img.draggable = false;
    }

    const b = document.createElement("button");
    b.className = "car-dot";
    b.type = "button";
    b.setAttribute("aria-label", "Go to image " + (i + 1));
    b.addEventListener("click", () => setActive(i));
    dotsWrap.appendChild(b);

    it.addEventListener("click", () => {
      if (dragged) return;
      if (i !== active) {
        setActive(i);
        return;
      }
      if (!img) return;
      lbi.src = img.src;
      lbi.alt = img.alt;
      lb.classList.add("open");
      document.body.style.overflow = "hidden";
    });
  });
  const dots = [...dotsWrap.children];

  function layout(){
    renderFrame = 0;
    const w = items[0].offsetWidth || 420;
    const narrow = cf.clientWidth < 640;
    // The sine curve keeps the transition stable while the first offset leaves
    // a slight edge overlap; z-index keeps neighbours behind the active card.
    const firstStep = narrow ? .76 : .68;
    const nextStep = narrow ? .11 : .13;
    const maxAngle = narrow ? 52 : 57;
    const localPerspective = narrow ? 760 : 1100;
    active = clamp(Math.round(position), 0, n - 1);

    items.forEach((it, i) => {
      const off = i - position;
      const abs = Math.abs(off);
      const sign = Math.sign(off);
      const side = Math.min(abs, 1);
      const beyond = Math.max(0, abs - 1);
      const spread = Math.sin(side * Math.PI / 2);
      const tx = sign * w * (firstStep * spread + nextStep * beyond);
      const ry = -sign * maxAngle * side;
      const scale = 1 - Math.min(narrow ? .14 : .18, side * .045 + beyond * (narrow ? .035 : .042));
      // Keep the compact Cover Flow stack visible. The full-bleed viewport
      // provides the extra room; cards beyond the immediate neighbours fade
      // toward the edges instead of disappearing and breaking the flow apart.
      const visible = narrow ? abs <= 2.15 : true;
      const fade = visible
        ? clamp(1 - Math.max(0, abs - 1) * (narrow ? .32 : .13), narrow ? .2 : .28, 1)
        : 0;
      const selected = i === active;

      it.style.opacity = fade;
      it.style.pointerEvents = visible ? "auto" : "none";
      it.style.zIndex = String(selected ? 1000 : 900 - Math.round(abs * 100));
      it.style.transform = `translate(-50%,-50%) translateX(${tx}px) perspective(${localPerspective}px) rotateY(${ry}deg) scale(${scale})`;
      it.classList.toggle("active", selected);
      it.tabIndex = selected ? 0 : -1;
      it.setAttribute("aria-hidden", visible ? "false" : "true");
      if (selected) it.setAttribute("aria-current", "true");
      else it.removeAttribute("aria-current");
    });

    dots.forEach((d, i) => {
      d.classList.toggle("on", i === active);
      d.setAttribute("aria-current", i === active ? "true" : "false");
    });
    if (currentEl) currentEl.textContent = pad(active + 1);
  }

  function requestLayout(){
    if (renderFrame) return;
    renderFrame = requestAnimationFrame(layout);
  }

  function stopSnap(){
    if (snapFrame) cancelAnimationFrame(snapFrame);
    snapFrame = 0;
    cf.classList.remove("is-animating");
  }

  function setActive(index, focusItem = false){
    const target = clamp(Math.round(index), 0, n - 1);
    const from = position;
    const distance = target - from;
    window.clearTimeout(wheelTimer);
    cf.classList.remove("is-dragging");
    stopSnap();

    if (Math.abs(distance) < .001 || reducedMotion.matches) {
      position = target;
      layout();
      if (focusItem) items[target].focus({ preventScroll:true });
      return;
    }

    const startedAt = performance.now();
    const duration = clamp(360 + Math.abs(distance) * 80, 360, 620);
    cf.classList.add("is-animating");

    const tick = now => {
      const progress = clamp((now - startedAt) / duration, 0, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      position = from + distance * eased;
      layout();
      if (progress < 1) {
        snapFrame = requestAnimationFrame(tick);
        return;
      }
      snapFrame = 0;
      const direction = Math.sign(distance);
      position = direction ? target - direction * .0002 : target;
      layout();
      cf.classList.remove("is-animating");
      position = target;
      layout();
      if (focusItem) items[target].focus({ preventScroll:true });
    };

    snapFrame = requestAnimationFrame(tick);
  }

  cf.addEventListener("pointerdown", e => {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    stopSnap();
    pointerId = e.pointerId;
    startX = lastX = e.clientX;
    startPosition = position;
    lastTime = e.timeStamp;
    velocity = 0;
    dragged = false;
    cf.classList.add("is-dragging");
    if (cf.setPointerCapture) cf.setPointerCapture(pointerId);
  });

  cf.addEventListener("pointermove", e => {
    if (pointerId !== e.pointerId) return;
    const dx = e.clientX - startX;
    const dt = Math.max(8, e.timeStamp - lastTime);
    if (Math.abs(dx) > 4) dragged = true;
    velocity = (e.clientX - lastX) / dt;
    lastX = e.clientX;
    lastTime = e.timeStamp;
    position = clamp(startPosition - dx / (cf.clientWidth < 640 ? 130 : 150), 0, n - 1);
    requestLayout();
    if (dragged) e.preventDefault();
  });

  function finishPointer(e, cancelled = false){
    if (pointerId === null || (e && e.pointerId !== pointerId)) return;
    if (cf.releasePointerCapture && cf.hasPointerCapture && cf.hasPointerCapture(pointerId)) cf.releasePointerCapture(pointerId);
    const step = cf.clientWidth < 640 ? 130 : 150;
    const momentum = cancelled ? 0 : clamp(-velocity * 100 / step, -.28, .28);
    const projected = position + momentum;
    pointerId = null;
    setActive(Math.round(projected));
    window.setTimeout(() => { dragged = false; }, 90);
  }

  cf.addEventListener("pointerup", e => finishPointer(e));
  cf.addEventListener("pointercancel", e => finishPointer(e, true));

  cf.addEventListener("wheel", e => {
    const shifted = e.shiftKey && Math.abs(e.deltaY) > Math.abs(e.deltaX);
    const delta = shifted ? e.deltaY : e.deltaX;
    if (!shifted && Math.abs(e.deltaX) <= Math.abs(e.deltaY)) return;
    if (Math.abs(delta) < 1) return;
    e.preventDefault();
    stopSnap();
    const px = e.deltaMode === 1 ? delta * 16 : e.deltaMode === 2 ? delta * cf.clientWidth : delta;
    position = clamp(position + px / (cf.clientWidth < 640 ? 120 : 135), 0, n - 1);
    cf.classList.add("is-dragging");
    requestLayout();
    window.clearTimeout(wheelTimer);
    wheelTimer = window.setTimeout(() => setActive(Math.round(position)), 180);
  }, { passive:false });

  cf.addEventListener("keydown", e => {
    let target = null;
    if (e.key === "ArrowLeft") target = active - 1;
    if (e.key === "ArrowRight") target = active + 1;
    if (e.key === "Home") target = 0;
    if (e.key === "End") target = n - 1;
    if (target === null) return;
    e.preventDefault();
    setActive(target, true);
  });

  window.addEventListener("resize", requestLayout, { passive:true });
  cf.classList.add("is-initializing");
  layout();
  requestAnimationFrame(() => cf.classList.remove("is-initializing"));
  window.addEventListener("load", layout, { once:true });
})();

applyLang(lang);
</script>
</body>
</html>
