<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>何梁宇 — HE LIANGYU</title>
</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#ebe7df}

#vp{
width:100%;height:100vh;overflow:hidden;position:relative;
background:#ebe7df;font-family:‘Space Mono’,monospace;
cursor:grab;transition:background .6s;
}
#vp.dark-mode{background:#ebe7df;cursor:grab}
#vp.panning{cursor:grabbing}

#world{
position:absolute;top:0;left:0;
will-change:transform;
}
#world::before{
content:’’;position:absolute;inset:0;
background-image:radial-gradient(circle,rgba(0,0,0,.055) 1px,transparent 1px);
background-size:52px 52px;pointer-events:none;
transition:opacity .6s;
}
#vp.dark-mode #world::before{
background-image:radial-gradient(circle,rgba(0,0,0,.055) 1px,transparent 1px);
}

.obj{position:absolute;cursor:pointer;user-select:none;will-change:transform;
transition:transform .58s cubic-bezier(.4,0,.2,1),left .58s cubic-bezier(.4,0,.2,1),top .58s cubic-bezier(.4,0,.2,1),filter .22s}
.obj.nd{transition:none!important}
.shadow{position:absolute;border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,.16) 0%,transparent 70%);pointer-events:none;
transition:left .58s,top .58s,width .58s,opacity .3s}
.shadow.nd{transition:none!important}

.pile-lbl{position:absolute;font-size:14px;letter-spacing:2.4px;text-transform:uppercase;
pointer-events:none;transform:translateX(-50%);transition:opacity .4s,color .5s;opacity:0;white-space:nowrap;color:#888}
#vp.dark-mode .pile-lbl{color:#888}
.pile-hit{position:absolute;cursor:pointer;z-index:200}

/* ── HUD ── */
#hud{position:absolute;inset:0;pointer-events:none;z-index:300}

/* top bar */
#topbar{
position:absolute;top:0;left:0;right:0;
display:flex;align-items:center;justify-content:space-between;
padding:14px 18px;pointer-events:all;
}
.logo-btn{
font-family:‘Bebas Neue’,sans-serif;font-size:22px;letter-spacing:2.2px;
color:#1a1a1a;cursor:pointer;transition:color .4s;background:none;border:none;
pointer-events:all;
}
#vp.dark-mode .logo-btn{color:#1a1a1a}

/* lang globe */
.lang-globe{
background:none;border:none;cursor:pointer;padding:4px;
color:#1a1a1a;opacity:.45;
display:flex;align-items:center;justify-content:center;
transition:opacity .2s;-webkit-tap-highlight-color:transparent;
pointer-events:all;
}
.lang-globe:hover{opacity:1}
#vp.dark-mode .lang-globe{color:#1a1a1a}

/* toggle */
#toggle{
position:absolute;bottom:max(34px,calc(env(safe-area-inset-bottom,0px) + 30px));left:50%;transform:translateX(-50%);
display:flex;align-items:center;gap:14px;padding:14px 26px 14px 18px;
background:#fff;border:.5px solid rgba(0,0,0,.12);
cursor:pointer;user-select:none;pointer-events:all;
transition:background .5s,border-color .5s;
}
#toggle.active{background:rgba(255,255,252,.98);border-color:rgba(0,0,0,.16);box-shadow:0 10px 28px rgba(0,0,0,.09)}
#toggle:hover{border-color:rgba(0,0,0,.3)}
#toggle.active:hover{border-color:rgba(0,0,0,.26)}
.sw{width:40px;height:24px;background:#d8d8d4;border-radius:12px;position:relative;transition:background .28s;flex-shrink:0}
.sw.on{background:#f3f3ef}
.sw-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#1a1a1a;transition:left .25s cubic-bezier(.4,0,.2,1),background .28s}
.sw.on .sw-knob{left:19px}
.sw-lbl{font-size:14px;letter-spacing:2.2px;text-transform:uppercase;color:#999;white-space:nowrap;transition:color .4s}
#toggle.active .sw-lbl{color:#5a5a55}
#toggle.active .sw{background:#cfcfc9}
#toggle.active .sw.on{background:#fff}
#toggle.active .sw.on .sw-knob{background:#111}

/* ── BIO OVERLAY ── */
#bio{
position:absolute;inset:0;z-index:400;
background:rgba(104,11,17,0);
backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);
pointer-events:none;opacity:0;visibility:hidden;
transition:background .38s,backdrop-filter .38s,-webkit-backdrop-filter .38s,opacity .3s,visibility 0s linear .3s;
display:flex;align-items:center;justify-content:center;
}
#bio.open{
background:#b60d12;
backdrop-filter:none;-webkit-backdrop-filter:none;
pointer-events:all;opacity:1;visibility:visible;
transition:background .38s,backdrop-filter .38s,-webkit-backdrop-filter .38s,opacity .3s;
}
#bio-close{
position:absolute;top:14px;right:14px;width:28px;height:28px;
border:.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);
color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;
cursor:pointer;opacity:0;pointer-events:none;transition:opacity .28s .1s;
}
#bio.open #bio-close{opacity:1;pointer-events:all}
#bio-model-bg{
position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:0;
transition:opacity .3s ease;
}
#bio.open #bio-model-bg{opacity:1}
#bio-model-bg::before{content:none}
#bio-inner{
position:relative;z-index:2;width:100%;height:100%;
padding:clamp(92px,13vh,132px) clamp(24px,6vw,96px) calc(env(safe-area-inset-bottom,0px) + 36px);
display:flex;align-items:flex-start;justify-content:flex-start;
pointer-events:none;
opacity:0;transform:translateY(14px);
transition:opacity .32s .1s,transform .32s .1s;
}
#bio.open #bio-inner{opacity:1;transform:translateY(0)}
.bio-copy{
display:flex;flex-direction:column;align-items:flex-start;
width:min(470px,calc(100vw - 3rem));position:relative;z-index:2;
pointer-events:auto
}
.bio-name{
font-family:‘Bebas Neue’,sans-serif;
font-size:92px;line-height:.88;color:#fff;letter-spacing:1px;
margin-bottom:2.2rem
}
.bio-name span{display:block}
.bio-name-sub{
font-size:30px;line-height:1.02;letter-spacing:3px;
color:rgba(255,241,236,.82);margin-top:.55rem
}
.bio-block{width:100%;padding:1rem 0;border-top:.5px solid rgba(255,255,255,.22)}
.bio-block:last-child{border-bottom:.5px solid rgba(255,255,255,.2)}
.bio-head{
font-size:10px;letter-spacing:2.8px;text-transform:uppercase;
color:rgba(255,241,236,.68);margin-bottom:.8rem
}
.bio-practice{
font-size:24px;line-height:1.45;color:#fff;
letter-spacing:.04em
}
.bio-links{display:flex;flex-wrap:wrap;gap:.65rem}
.bio-link{
display:inline-flex;align-items:center;justify-content:center;
padding:10px 16px;border:.5px solid rgba(255,255,255,.25);
background:rgba(255,255,255,.08);color:#fff;
font-size:12px;letter-spacing:2.2px;text-transform:uppercase;
font-family:‘Space Mono’,monospace;text-decoration:none;cursor:pointer;
appearance:none;-webkit-appearance:none;outline:none
}
.bio-link-email{
text-transform:none;letter-spacing:.04em;font-size:11px;
}
.bio-link:hover{background:rgba(255,255,255,.14)}
.bio-link:focus-visible{border-color:rgba(255,255,255,.6)}
#bio-qr{
position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;
background:rgba(0,0,0,.28);opacity:0;visibility:hidden;pointer-events:none;
transition:opacity .24s ease,visibility 0s linear .24s;
}
#bio-qr.open{
opacity:1;visibility:visible;pointer-events:all;
transition:opacity .24s ease;
}
.bio-qr-card{
width:min(420px,calc(100vw - 2.2rem));background:rgba(255,255,255,.08);
border:.5px solid rgba(255,255,255,.24);padding:16px;
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.bio-qr-card img{
display:block;width:100%;height:auto;background:#fff;
}
#bio-model-stage{
position:absolute;inset:0;
display:flex;align-items:center;justify-content:center;overflow:hidden;
}
#bio-model-viewer{
width:100%;height:100%;display:block;pointer-events:none;
background:transparent;opacity:0;transform:translate3d(0,0,0) scale(1);
transition:opacity .45s ease;
--poster-color:transparent;
transform-origin:50% 48%;
will-change:transform;
}
#bio.open #bio-model-viewer.ready{opacity:1}
#bio-model-stage canvas{
width:100%!important;height:100%!important;display:block;pointer-events:none;
}
.bio-model-status{
position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
font-size:12px;letter-spacing:3px;text-transform:uppercase;
color:rgba(255,241,236,.64);white-space:nowrap
}
.bio-model-status.hidden{opacity:0}

/* ── LAUNCHPAD ── */
#lp{position:absolute;inset:0;z-index:500;background:rgba(25,25,25,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);pointer-events:none;transition:background .36s,backdrop-filter .36s,-webkit-backdrop-filter .36s;display:flex;flex-direction:column;align-items:center;justify-content:center}
#lp.open{background:rgba(25,25,25,.92);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);pointer-events:all}
#lp-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border:.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);font-size:10px;color:#888;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .28s .1s}
#lp.open #lp-close{opacity:1;pointer-events:all}
#lp-close:hover{background:rgba(255,255,255,.12);color:#ccc}
#lp-cat{font-family:‘Bebas Neue’,sans-serif;font-size:42px;letter-spacing:2.2px;color:#e8e8e6;opacity:0;transform:translateY(8px);transition:opacity .3s .08s,transform .3s .08s}
#lp.open #lp-cat{opacity:1;transform:translateY(0)}
#lp-sub{font-size:11px;letter-spacing:2.2px;color:#666;text-transform:uppercase;margin-bottom:3.2rem;opacity:0;transition:opacity .3s .12s}
#lp.open #lp-sub{opacity:1}
#lp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,240px));justify-content:center;align-items:start;gap:2.8rem 3rem;max-width:1120px;width:min(1120px,calc(100vw - 6rem));padding:0;opacity:0;transform:translateY(14px);transition:opacity .32s .14s,transform .32s .14s}
#lp.open #lp-grid{opacity:1;transform:translateY(0)}
.lp-icon{display:flex;flex-direction:column;align-items:center;gap:1rem;cursor:pointer;width:240px}
.lp-art{width:240px;height:176px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 12px 28px rgba(0,0,0,.32));transition:transform .22s cubic-bezier(.34,1.56,.64,1),filter .22s}
.lp-icon:hover .lp-art{transform:scale(1.06);filter:drop-shadow(0 18px 36px rgba(0,0,0,.42))}
.lp-name{font-size:15px;letter-spacing:.35px;color:#d6d6d2;text-align:center;white-space:nowrap}
.lp-year{font-size:10px;letter-spacing:2px;color:#787878;text-transform:uppercase}
.art-box{display:flex;align-items:center;justify-content:center;background:transparent;overflow:hidden}
.art-box img,.art-box svg{display:block;max-width:100%;max-height:100%;background:transparent}
.lp-art .art-box{width:100%!important;height:100%!important}
.lp-art .art-box img{width:100%;height:100%;object-fit:contain}
.lp-art .art-box svg{width:100%!important;height:100%!important}

/* ── DETAIL ── */
#det{position:absolute;inset:0;z-index:600;background:#f7f7f5;opacity:0;pointer-events:none;transition:opacity .28s;overflow-y:auto}
#det.open{opacity:1;pointer-events:all}
#det-back{position:absolute;top:14px;left:14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#aaa;cursor:pointer;padding:8px 12px;border:.5px solid rgba(0,0,0,.1);background:#fff;transition:background .2s;z-index:10}
#det-back:hover{background:#f0f0ee}
#det-in{padding:4.5rem 2.4rem 4rem;max-width:920px;margin:0 auto}
.d-hero{display:flex;gap:2.2rem;align-items:flex-start;margin-bottom:1.6rem;padding-top:1.4rem}
.d-art{display:flex;align-items:center;justify-content:center;flex-shrink:0;filter:drop-shadow(0 6px 18px rgba(0,0,0,.1))}
.d-title{font-family:‘Bebas Neue’,sans-serif;font-size:52px;line-height:.96;color:#1a1a1a;margin-bottom:8px}
.d-meta{font-size:12px;letter-spacing:2px;color:#bbb;text-transform:uppercase;margin-bottom:.9rem}
.d-badge{display:inline-block;font-size:10px;padding:5px 11px;border:.5px solid rgba(0,0,0,.1);color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:.9rem}
.d-tags{display:flex;gap:3px;flex-wrap:wrap}
.d-tag{font-size:10px;padding:4px 9px;border:.5px solid rgba(0,0,0,.08);color:#bbb;letter-spacing:1px;text-transform:uppercase}
.div{height:.5px;background:rgba(0,0,0,.06);margin:1.2rem 0}
.d-media{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.2rem}
.d-cell{aspect-ratio:4/3;background:rgba(0,0,0,.03);display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:1.5px;color:#ccc;text-transform:uppercase}
.d-cell.vid{background:#0d0d0d}
.pr{width:28px;height:28px;border:1px solid rgba(255,255,255,.4);border-radius:50%;display:flex;align-items:center;justify-content:center}
.pt{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid rgba(255,255,255,.7);margin-left:2px}
.d-desc{font-size:15px;line-height:1.95;color:#555;font-style:italic;margin-bottom:1.1rem}
.d-ar{display:flex;align-items:center;gap:10px;padding:12px 14px;border:.5px solid rgba(0,0,0,.14);background:transparent;width:100%;font-family:‘Space Mono’,monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#333;cursor:pointer;margin-bottom:1rem;transition:background .2s}
.d-ar:hover{background:rgba(0,0,0,.02)}
.d-ari{width:22px;height:22px;border:1px solid #555;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.d-acts{display:flex;gap:5px;flex-wrap:wrap}
.d-btn{padding:8px 14px;border:.5px solid rgba(0,0,0,.13);background:transparent;font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555;cursor:pointer;transition:background .2s}
.d-btn:hover{background:rgba(0,0,0,.03)}
@media (max-width:760px){
  #topbar{padding:16px 18px}
  .logo-btn{font-size:24px}
  .pile-lbl{font-size:16px;letter-spacing:1.9px}
  #toggle{bottom:calc(env(safe-area-inset-bottom,0px) + 52px);padding:16px 30px 16px 20px;gap:14px}
  .sw{width:46px;height:28px;border-radius:14px}
  .sw-knob{top:3px;left:3px;width:22px;height:22px}
  .sw.on .sw-knob{left:21px}
  .sw-lbl{font-size:15px;letter-spacing:1.9px}
  #bio-inner{
    padding:86px 18px calc(env(safe-area-inset-bottom,0px) + 22px)
  }
  .bio-copy{width:min(360px,calc(100vw - 2.25rem))}
  .bio-name{font-size:58px;margin-bottom:1.4rem}
  .bio-name-sub{font-size:22px;letter-spacing:2px;margin-top:.35rem}
  .bio-head{font-size:10px;margin-bottom:.6rem}
  .bio-practice{font-size:18px;line-height:1.5}
  .bio-link{font-size:11px;padding:10px 14px}
  .bio-model-status{font-size:11px;letter-spacing:2.4px}
  #lp-cat{font-size:32px}
  #lp-sub{font-size:10px;margin-bottom:2.2rem}
  #lp-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1.8rem 1.2rem;width:calc(100vw - 2.5rem)}
  .lp-icon{width:100%;gap:.7rem}
  .lp-art{width:100%;height:120px}
  .lp-name{font-size:13px}
  .lp-year{font-size:9px}
  #det-in{padding:4rem 1.2rem 2.4rem}
  .d-hero{flex-direction:column;gap:1.2rem}
  #det-back{font-size:11px}
  .d-title{font-size:42px}
  .d-meta{font-size:12px}
  .d-badge,.d-tag,.d-btn{font-size:10px}
  .d-desc{font-size:16px;line-height:1.9}
}
@media (hover:none) and (pointer:coarse) and (min-width:761px){
  #toggle{bottom:calc(env(safe-area-inset-bottom,0px) + 46px)}
}
</style>

<div id="vp">
  <div id="world"></div>
  <div id="hud">
    <div id="topbar">
      <button class="logo-btn" id="bio-btn">HE LIANGYU</button>
      <button class="lang-globe" id="lang-cycle-btn" aria-label="Switch language">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Launchpad -->

  <div id="lp">
    <div id="lp-close">✕</div>
    <div id="lp-cat"></div><div id="lp-sub"></div>

  <!-- Detail -->

  <div id="det"><div id="det-back">← 返回</div><div id="det-in"></div></div>
</div>

<script>

function clamp(){const vw=vp.offsetWidth,vh=vp.offsetHeight;camX=Math.max(0,Math.min(getWW()-vw,camX));camY=Math.max(0,Math.min(getWH()-vh,camY));}

function pilePos(ci){
  const WW=getWW(),WH=getWH(),vw=vp.offsetWidth,vh=vp.offsetHeight,ratio=vw/vh,n=CATS.length;
  const cx=WW/2,cy=WH/2;
  if(ratio<0.75){
    // tall/narrow (phone): vertical stack
    const span=Math.min(vh*.74,520),gap=n>1?span/(n-1):0;
    return{x:cx,y:cy-span/2+ci*gap};
  }else if(ratio<1.3){
    // squarish: 2-column grid
    const cols=2,rows=Math.ceil(n/cols);
    const col=ci%cols,row=Math.floor(ci/cols);
    const gx=Math.min(vw*.42,300),gy=Math.min(vh*.3,210);
    return{x:cx-gx/2+col*gx,y:cy-gy*(rows-1)/2+row*gy};
  }else{
    // wide (desktop): horizontal row
    const span=Math.min(vw*.72,820),gap=n>1?span/(n-1):0;
    return{x:cx-span/2+ci*gap,y:cy};
  }
}

function iSVG(w,size=88,mode='fit'){
  const sc=size/Math.max(w.w,w.h),rw=Math.round(w.w*sc),rh=Math.round(w.h*sc);
  if(w.img){
    return`<div class="art-box" style="width:${rw}px;height:${rh}px"><img src="${w.img}" alt="${w.t}"></div>`;
  }
  const body=w.svg.replace(/<svg[^>]*>/,'').replace(/<\/svg>/,'');
  return`<div class="art-box" style="width:${rw}px;height:${rh}px"><svg viewBox="0 0 ${w.w} ${w.h}" width="${rw}" height="${rh}" xmlns="http://www.w3.org/2000/svg">${body}</svg></div>`;
}

// non-overlapping scatter placement
function scatterAll(){
  const WW=getWW(),WH=getWH(),placed=[];
  const isMobile=vp.offsetWidth<768;
  function canPlace(x,y,w,h,pad){
    return placed.every(p=>
      x+w+pad<p.x||
      x>p.x+p.w+pad||
      y+h+pad<p.y||
      y>p.y+p.h+pad
    );
  }
  function boundsFor(expand=0){
    const spreadW=Math.min(WW*(isMobile ? .96+expand : .74+expand*.4),isMobile?1080:920);
    const spreadH=Math.min(WH*(isMobile ? .98+expand : .7+expand*.35),isMobile?1180:720);
    const minX=Math.max(isMobile?8:20,(WW-spreadW)/2);
    const minY=Math.max(isMobile?12:24,(WH-spreadH)/2);
    return{
      minX,
      minY,
      maxX:WW-minX,
      maxY:WH-minY
    };
  }
  const items=WORKS.map((w,i)=>({w,i})).sort((a,b)=>(b.w.w*b.w.h)-(a.w.w*a.w.h));
  const result=new Array(WORKS.length);
  items.forEach(({w,i})=>{
    const triesMax=isMobile?900:240;
    let placedItem=null;
    const pads=isMobile?[42,34,26,18,10,0]:[24,12,0];
    for(let expandStep=0;expandStep<(isMobile?5:3)&&!placedItem;expandStep++){
      const b=boundsFor(expandStep*.08);
      for(const pad of pads){
        for(let tries=0;tries<triesMax;tries++){
          const x=b.minX+Math.random()*Math.max(1,b.maxX-b.minX-w.w);
          const y=b.minY+Math.random()*Math.max(1,b.maxY-b.minY-w.h);
          const rot=(Math.random()-.5)*(isMobile?9:12);
          if(canPlace(x,y,w.w,w.h,pad)){
            placed.push({x,y,w:w.w,h:w.h});
            placedItem={x,y,rot};
            break;
          }
        }
        if(placedItem)break;
      }
    }
    if(!placedItem){
      const b=boundsFor(isMobile ? .4 : .2);
      const x=b.minX+Math.random()*Math.max(1,b.maxX-b.minX-w.w);
      const y=b.minY+Math.random()*Math.max(1,b.maxY-b.minY-w.h);
      placed.push({x,y,w:w.w,h:w.h});
      placedItem={x,y,rot:(Math.random()-.5)*(isMobile?8:12)};
    }
    result[i]=placedItem;
  });
  return result;
}
const initPos=scatterAll();
const WORKS_BY_CAT=Object.fromEntries(CATS.map(cat=>[cat,WORKS.filter(w=>w.cat===cat)]));

// build states
const states=WORKS.map((w,i)=>{
  const sp=initPos[i];
  const shEl=document.createElement('div');shEl.className='shadow nd';shEl.style.cssText=`width:${w.w*.6}px;height:20px;z-index:1;position:absolute`;world.appendChild(shEl);
  const el=document.createElement('div');el.className='obj nd';el.style.cssText=`left:${sp.x}px;top:${sp.y}px;width:${w.w}px;position:absolute;z-index:${objZ++}`;el.innerHTML=w.img?`<img src="${w.img}" style="width:100%;display:block;pointer-events:none">`:w.svg;el.style.transform=`rotate(${sp.rot}deg)`;el.style.filter='drop-shadow(0 6px 18px rgba(0,0,0,.09))';world.appendChild(el);
  const pileIndex=WORKS_BY_CAT[w.cat].findIndex(item=>item.t===w.t);
  const pileCenter=pileIndex-(WORKS_BY_CAT[w.cat].length-1)/2;
  const s={w,el,shEl,x:sp.x,y:sp.y,rot:sp.rot,hx:sp.x,hy:sp.y,hrot:sp.rot,pileIndex,pileCount:WORKS_BY_CAT[w.cat].length,pileCenter,grabbed:false,dist:0,mode:'scatter',lx:0,ly:0};
  requestAnimationFrame(()=>{el.classList.remove('nd');shEl.classList.remove('nd');});
  el.addEventListener('mouseenter',()=>{if(s.mode==='pile')return;el.style.filter='drop-shadow(0 16px 32px rgba(0,0,0,.14))';});
  el.addEventListener('mouseleave',()=>{el.style.filter='drop-shadow(0 6px 18px rgba(0,0,0,.09))';s.lx=0;s.ly=0;setT(s);});
  el.addEventListener('mousemove',e=>{if(s.mode==='pile')return;const r=el.getBoundingClientRect();s.lx=-(e.clientY-r.top-r.height/2)/r.height*9;s.ly=(e.clientX-r.left-r.width/2)/r.width*9;setT(s);});
  el.addEventListener('click',e=>{e.stopPropagation();if(s.mode==='pile'){openLP(CATS.indexOf(s.w.cat));}else{if(s.w.url){window.location.href=s.w.url;}else{openDetail(s.w,false);}}});
  el.addEventListener('touchend',e=>{if(!isPanning){e.stopPropagation();if(s.mode==='pile'){openLP(CATS.indexOf(s.w.cat));}else{if(s.w.url){window.location.href=s.w.url;}else{openDetail(s.w,false);}}}});
  placeSh(s);return s;
});

function setT(s,sc=1){s.el.style.transform=`rotate(${s.rot}deg) scale(${sc}) perspective(600px) rotateX(${s.lx}deg) rotateY(${s.ly}deg)`;}
function placeSh(s){const lift=s.mode==='pile'?8:14,shsc=.58;s.shEl.style.left=(s.x+s.w.w*(1-shsc)/2)+'px';s.shEl.style.top=(s.y+s.w.h+lift)+'px';s.shEl.style.width=(s.w.w*shsc)+'px';s.shEl.style.opacity=s.mode==='pile'?'.08':'.2';}
function pileMetrics(s){
  const isMobile=vp.offsetWidth<768;
  const spreadBoost=isMobile&&s.pileCount>3?1.2:1;
  const dxUnit=isMobile?30:18;
  const dyUnit=isMobile?16:8;
  const rotUnit=isMobile?4.6:3.5;
  return{
    dx:s.pileCenter*dxUnit*spreadBoost,
    dy:Math.abs(s.pileCenter)*dyUnit*spreadBoost,
    rot:s.pileCenter*rotUnit
  };
}
function applyPileLayout(s,pp){
  const pm=pileMetrics(s);
  s.x=pp.x-s.w.w/2+pm.dx;
  s.y=pp.y-s.w.h/2+pm.dy;
  s.rot=pm.rot;
}

vp.addEventListener('touchstart',e=>{if(e.target.closest('#toggle,#topbar'))return;if(e.touches.length===1){isPanning=true;panSX=e.touches[0].clientX;panSY=e.touches[0].clientY;panCX=camX;panCY=camY;}},{passive:true});

function onMove(cx,cy){if(!isPanning)return;camX=panCX-(cx-panSX);camY=panCY-(cy-panSY);clamp();applyC();}
function onUp(){isPanning=false;vp.classList.remove('panning');}

  } else {
    states.forEach(s=>{s.x=s.hx;s.y=s.hy;s.rot=s.hrot;s.lx=0;s.ly=0;s.mode='scatter';s.el.style.left=s.x+'px';s.el.style.top=s.y+'px';setT(s);placeSh(s);s.el.style.filter='drop-shadow(0 6px 18px rgba(0,0,0,.09))';});

  h+=`<div class="div"></div><p class="d-desc">${w.desc}</p><div class="div"></div>`;
  if(w.ar)h+=`<button class="d-ar"><div class="d-ari">AR</div><span>${t('ar_launch')}</span></button>`;
  h+=`<div class="d-acts"><button class="d-btn">${t('dl')}</button><button class="d-btn">${t('share')}</button><button class="d-btn">${t('inquiry')}</button></div>`;
  detIn.innerHTML=h;det.classList.add('open');
}
detBack.addEventListener('click',()=>{det.classList.remove('open');currentDetail=null;});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(det.classList.contains('open')){det.classList.remove('open');currentDetail=null;}else if(lp.classList.contains('open')){lp.classList.remove('open');currentLpCi=null;}else if(bioQr?.classList.contains('open')){closeBioQr();}else closeBioPanel();}});

updateHits();
</script>

<script type="module">
import './vendor/model-viewer.min.js';

const bioPanel=document.getElementById('bio');
const bioViewer=document.getElementById('bio-model-viewer');
const bioStatus=document.getElementById('bio-model-status');
const USES_FILE_PROTOCOL=window.location.protocol==='file:';

if(bioViewer){
  let rafId=0;
  let activePose=null;
  let modelBounds=null;
  let modelRequested=false;
  let preloadScheduled=false;
  let motionStartTime=0;
  let motionWanted=false;
  const VIEWER_SHOTS=[
    {
      orient:[-8,4,-84],
      orbit:[-18,94],
      compose:{targetOffsetX:-0.08,targetOffsetY:0.06,targetOffsetZ:0,frameX:0.08,frameY:0.52,distanceScale:0.042},
      scan:{scanDirection:-1,start:0.58,end:-0.62}
    },
    {
      orient:[8,-2,-92],
      orbit:[12,95],
      compose:{targetOffsetX:-0.06,targetOffsetY:-0.05,targetOffsetZ:0,frameX:0.04,frameY:0.46,distanceScale:0.038},
      scan:{scanDirection:1,start:-0.58,end:0.62}
    },
    {
      orient:[-12,4,-72],
      orbit:[-6,93],
      compose:{targetOffsetX:-0.09,targetOffsetY:0.08,targetOffsetZ:0,frameX:0.1,frameY:0.58,distanceScale:0.044},
      scan:{scanDirection:-1,start:0.60,end:-0.64}
    },
    {
      orient:[14,5,-98],
      orbit:[24,95],
      compose:{targetOffsetX:-0.05,targetOffsetY:-0.07,targetOffsetZ:0,frameX:0.02,frameY:0.42,distanceScale:0.036},
      scan:{scanDirection:1,start:-0.60,end:0.64}
    },
    {
      orient:[-10,-2,-82],
      orbit:[-24,94],
      compose:{targetOffsetX:-0.07,targetOffsetY:0.06,targetOffsetZ:0,frameX:0.06,frameY:0.5,distanceScale:0.040},
      scan:{scanDirection:-1,start:0.59,end:-0.63}
    }
  ];

  function clampNum(value,min,max){
    return Math.min(max,Math.max(min,value));
  }

  function formatDeg(value){
    return `${value.toFixed(1)}deg`;
  }

  function formatM(value){
    return `${value.toFixed(1)}m`;
  }

  function degToRad(value){
    return value*Math.PI/180;
  }

  function getViewportBox(){
    const vv=window.visualViewport;
    const width=vv?.width||window.innerWidth;
    const height=vv?.height||window.innerHeight;
    return{
      width,
      height,
      minDim:Math.min(width,height),
      aspect:width/Math.max(height,1)
    };
  }

  function randomizePose(baseShot){
    return{
      orientation:[
        baseShot.orient[0]+(Math.random()*3-1.5),
        baseShot.orient[1]+(Math.random()*2-1),
        baseShot.orient[2]+(Math.random()*4-2),
      ],
      orbit:[
        baseShot.orbit[0]+(Math.random()*2.4-1.2),
        clampNum(baseShot.orbit[1]+(Math.random()*1.2-.6),92,98),
      ],
      compose:{
        targetOffsetX:baseShot.compose.targetOffsetX+(Math.random()*0.014-.007),
        targetOffsetY:baseShot.compose.targetOffsetY+(Math.random()*0.014-.007),
        targetOffsetZ:baseShot.compose.targetOffsetZ+(Math.random()*0.012-.006),
        frameX:baseShot.compose.frameX+(Math.random()*0.12-.06),
        frameY:baseShot.compose.frameY+(Math.random()*0.16-.08),
        distanceScale:baseShot.compose.distanceScale+(Math.random()*0.02-.01)
      },
      scan:baseShot.scan,
      motion:{
        lookXRange:0.065+Math.random()*0.022,
        scanSpeed:0.000013+Math.random()*0.000003,
        lookPhase:Math.random()*Math.PI*2,
        driftSpeed:[
          0.00005+Math.random()*0.000012,
          0.000044+Math.random()*0.000012
        ],
        driftPhase:[
          Math.random()*Math.PI*2,
          Math.random()*Math.PI*2
        ],
        driftXRange:0.006+Math.random()*0.003,
        driftYRange:0.012+Math.random()*0.004
      }
    };
  }

  function getViewportProfile(){
    const {minDim,aspect}=getViewportBox();
    const compactRatio=clampNum((720-minDim)/320,0,1);
    return{
      frameXAdjust:aspect<.72?-.02:aspect>1.65?.1:.06,
      frameYAdjust:aspect<.72?.12:aspect>1.65?.04:.08,
      heightFill:aspect<.72?4.0:3.1,
      widthFill:aspect<.72?2.2:1.8,
      fov:11.9+compactRatio*.28+(aspect<.72?.08:0),
      distanceAdjust:compactRatio*.01
    };
  }

  function setStatus(text){
    if(!bioStatus)return;
    bioStatus.textContent=text;
    bioStatus.classList.toggle('hidden',!text);
  }

  function ensureModelRequested(){
    if(modelRequested) return;
    const src=bioViewer.dataset.modelSrc;
    if(!src) return;
    modelRequested=true;
    bioViewer.setAttribute('src',src);
  }

  function scheduleModelPreload(){
    if(USES_FILE_PROTOCOL||preloadScheduled||modelRequested) return;
    preloadScheduled=true;
    const kick=()=>ensureModelRequested();
    if('requestIdleCallback' in window){
      window.requestIdleCallback(kick,{timeout:1400});
      return;
    }
    setTimeout(kick,650);
  }

  function getModelBounds(){
    if(modelBounds) return modelBounds;
    if(!bioViewer.model) return null;
    const dimensions=bioViewer.getDimensions?.();
    const center=bioViewer.getBoundingBoxCenter?.();
    if(!dimensions||!center) return null;
    modelBounds={
      dimensions,
      center,
      halfHeight:dimensions.y*.5,
      halfSpan:Math.hypot(dimensions.x,dimensions.z)*.5
    };
    return modelBounds;
  }

  function composeViewerPose(pose){
    const viewport=getViewportProfile();
    const bounds=getModelBounds();
    if(!bounds){
      return{
        orbit:[pose.orbit[0],pose.orbit[1],7],
        target:[18,72,6],
        frame:{
          x:viewport.frameXAdjust,
          y:viewport.frameYAdjust,
          scale:1
        },
        fov:viewport.fov
      };
    }
    const {aspect}=getViewportBox();
    const fov=viewport.fov;
    const fovY=degToRad(fov);
    const fovX=2*Math.atan(Math.tan(fovY*.5)*aspect);
    const fitHeight=bounds.halfHeight/(Math.tan(fovY*.5)*viewport.heightFill);
    const fitWidth=bounds.halfSpan/(Math.tan(fovX*.5)*viewport.widthFill);
    const rawFitDistance=Math.max(fitHeight,fitWidth);
    const safeDistance=rawFitDistance*(aspect<.72?.052:.040);
    const distance=Math.max(rawFitDistance*pose.compose.distanceScale*(1+viewport.distanceAdjust),safeDistance);
    return{
      orbit:[pose.orbit[0],pose.orbit[1],distance],
      target:[
        bounds.center.x+bounds.dimensions.x*pose.compose.targetOffsetX,
        bounds.center.y+bounds.dimensions.y*pose.compose.targetOffsetY,
        bounds.center.z+bounds.dimensions.z*pose.compose.targetOffsetZ
      ],
      frame:{
        x:pose.compose.frameX+viewport.frameXAdjust,
        y:pose.compose.frameY+viewport.frameYAdjust,
        scale:1
      },
      fov
    };
  }

  function applyViewerTransform(frame){
    bioViewer.style.transform=`translate3d(${frame.x}vw,${frame.y}vh,0) scale(${frame.scale})`;
  }

  function applyViewerOrientation(values){
    bioViewer.setAttribute('orientation',values.map(formatDeg).join(' '));
  }

  function applyViewerOrbit(values){
    bioViewer.setAttribute('camera-orbit',`${formatDeg(values[0])} ${formatDeg(values[1])} ${formatM(values[2])}`);
  }

  function applyViewerTarget(values){
    bioViewer.setAttribute('camera-target',`${formatM(values[0])} ${formatM(values[1])} ${formatM(values[2])}`);
  }

  function applyViewerFieldOfView(value){
    bioViewer.setAttribute('field-of-view',formatDeg(value));
  }

  function applyViewerPose(randomize=false){
    if(randomize||!activePose){
      activePose=randomizePose(VIEWER_SHOTS[Math.floor(Math.random()*VIEWER_SHOTS.length)]);
    }
    const composedPose=composeViewerPose(activePose);
    applyViewerFieldOfView(composedPose.fov);
    applyViewerOrientation(activePose.orientation);
    applyViewerOrbit(composedPose.orbit);
    applyViewerTarget(composedPose.target);
    bioViewer.jumpCameraToGoal?.();
    applyViewerTransform(composedPose.frame);
  }

  function stabilizeViewerPose(){
    requestAnimationFrame(()=>{
      if(!activePose) return;
      const composedPose=composeViewerPose(activePose);
      applyViewerFieldOfView(composedPose.fov);
      applyViewerOrientation(activePose.orientation);
      applyViewerOrbit(composedPose.orbit);
      applyViewerTarget(composedPose.target);
      bioViewer.jumpCameraToGoal?.();
      applyViewerTransform(composedPose.frame);
    });
  }

  function tuneViewerMaterial(){
    const materials=bioViewer.model?.materials||[];
    materials.forEach(material=>{
      const pbr=material.pbrMetallicRoughness;
      if(!pbr)return;
      try{ pbr.setMetallicFactor(0); }catch(e){}
      try{ pbr.setRoughnessFactor(1); }catch(e){}
    });
  }

  function animateViewer(time){
    const basePose=composeViewerPose(activePose||randomizePose(VIEWER_SHOTS[0]));
    const baseFrame=basePose.frame;
    const baseTarget=basePose.target;
    const bounds=getModelBounds();
    const motion=activePose?.motion;
    const elapsed=Math.max(0,time-motionStartTime);
    const settle=Math.min(1,elapsed/900);
    if(motion&&bounds){
      const scanUnit=(Math.sin(elapsed*motion.scanSpeed-Math.PI/2)+1)*.5;
      const crossWave=Math.sin(elapsed*(motion.scanSpeed*.62)+motion.lookPhase);
      const microX=Math.sin(time*motion.driftSpeed[0]+motion.driftPhase[0])*motion.driftXRange;
      const microY=Math.cos(time*motion.driftSpeed[1]+motion.driftPhase[1])*motion.driftYRange;
      const verticalRun=activePose.scan.start+(activePose.scan.end-activePose.scan.start)*scanUnit;
      applyViewerTarget([
        baseTarget[0]+bounds.dimensions.x*(crossWave*motion.lookXRange+microX)*settle,
        bounds.center.y+bounds.dimensions.y*(verticalRun+microY*activePose.scan.scanDirection)*settle,
        baseTarget[2]
      ]);
    }
    applyViewerTransform(baseFrame);
    rafId=requestAnimationFrame(animateViewer);
  }

  function startViewerMotion(){
    motionWanted=true;
    bioViewer.setAttribute('rotation-per-second','1.48deg');
    bioViewer.setAttribute('auto-rotate-delay','0');
    bioViewer.setAttribute('auto-rotate','');
    motionStartTime=performance.now();
    if(rafId){
      cancelAnimationFrame(rafId);
      rafId=0;
    }
    rafId=requestAnimationFrame(animateViewer);
  }

  function stopViewerMotion(){
    motionWanted=false;
    bioViewer.removeAttribute('auto-rotate');
    if(rafId){
      cancelAnimationFrame(rafId);
      rafId=0;
    }
    if(activePose) applyViewerOrientation(activePose.orientation);
    if(activePose){
      const composedPose=composeViewerPose(activePose);
      applyViewerFieldOfView(composedPose.fov);
      applyViewerOrbit(composedPose.orbit);
      applyViewerTarget(composedPose.target);
      bioViewer.jumpCameraToGoal?.();
    }
    applyViewerTransform(composeViewerPose(activePose||randomizePose(VIEWER_SHOTS[0])).frame);
  }

  function syncViewerToViewport(){
    if(!activePose) return;
    applyViewerPose(false);
    if(!rafId) applyViewerTransform(composeViewerPose(activePose).frame);
  }

  bioViewer.addEventListener('load',()=>{
    modelBounds=null;
    tuneViewerMaterial();
    bioViewer.classList.add('ready');
    setStatus('');
    applyViewerPose(false);
    stabilizeViewerPose();
    if(bio.classList.contains('open')||motionWanted){
      startViewerMotion();
    }
  });

  bioViewer.addEventListener('error',()=>{
    modelRequested=false;
    modelBounds=null;
    setStatus('3D Model Unavailable');
  });

  window.openBioPanel3D=()=>{
    motionWanted=true;
    if(USES_FILE_PROTOCOL){
      setStatus('3D Model Needs Localhost Preview');
      return;
    }
    if(!bioViewer.classList.contains('ready')){
      setStatus('Loading 3D Portrait...');
    }
    ensureModelRequested();
    applyViewerPose(true);
    stabilizeViewerPose();
    motionStartTime=performance.now();
    startViewerMotion();
  };

  window.closeBioPanel3D=()=>{ stopViewerMotion(); };
  window.addEventListener('resize',syncViewerToViewport);
  window.visualViewport?.addEventListener('resize',syncViewerToViewport);
  window.visualViewport?.addEventListener('scroll',syncViewerToViewport);
  new ResizeObserver(syncViewerToViewport).observe(document.documentElement);
  if(document.readyState==='complete'){
    scheduleModelPreload();
  }else{
    window.addEventListener('load',scheduleModelPreload,{once:true});
  }
}
</script>
