<style>

*{box-sizing:border-box;margin:0;padding:0}

#vp{
width:100%;height:100vh;overflow:hidden;position:relative;

#world{

}
#world::before{

}

.obj{position:absolute;cursor:pointer;user-select:none;will-change:transform;

.shadow{position:absolute;border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,.16) 0%,transparent 70%);pointer-events:none;

.pile-lbl{position:absolute;font-size:7.5px;letter-spacing:2.5px;text-transform:uppercase;

const lp=document.getElementById('lp'),lpClose=document.getElementById('lp-close'),lpCat=document.getElementById('lp-cat'),lpSub=document.getElementById('lp-sub'),lpGrid=document.getElementById('lp-grid');
const det=document.getElementById('det'),detBack=document.getElementById('det-back'),detIn=document.getElementById('det-in');

let sorted=false,camX=400,camY=300,isPanning=false,panSX=0,panSY=0,panCX=0,panCY=0,objZ=10;

function clamp(){const vw=vp.offsetWidth,vh=vp.offsetHeight;camX=Math.max(0,Math.min(getWW()-vw,camX));camY=Math.max(0,Math.min(getWH()-vh,camY));}
function applyC(){world.style.transform=`translate(${-camX}px,${-camY}px)`;}
sizeWorld();clamp();applyC();
window.addEventListener('resize',()=>{
  sizeWorld();
  // update pile labels + hits
  CATS.forEach((_,i)=>{const pp=pilePos(i);const lbl=document.getElementById('lbl-'+i);if(lbl){lbl.style.left=pp.x+'px';lbl.style.top=(pp.y+126)+'px';}});
  updateHits();
  // reposition piles if sorted
  if(sorted){
    states.forEach(s=>{const ci=CATS.indexOf(s.w.cat),pp=pilePos(ci);applyPileLayout(s,pp);s.el.style.left=s.x+'px';s.el.style.top=s.y+'px';setT(s);placeSh(s);});
    let ax=0,ay=0;CATS.forEach((_,i)=>{const pp=pilePos(i);ax+=pp.x;ay+=pp.y;});ax/=CATS.length;ay/=CATS.length;
    camX=ax-vp.offsetWidth/2;camY=ay-vp.offsetHeight/2;
  }
  clamp();applyC();
});

function pilePos(ci){
  const WW=getWW(),WH=getWH(),vw=vp.offsetWidth,vh=vp.offsetHeight,ratio=vw/vh,n=CATS.length;
  const cx=WW/2,cy=WH/2;
  if(ratio<0.75){
    // tall/narrow (phone): vertical stack
    const span=Math.min(vh*.6,420),gap=n>1?span/(n-1):0;
    return{x:cx,y:cy-span/2+ci*gap};
  }else if(ratio<1.3){
    // squarish: 2-column grid
    const cols=2,rows=Math.ceil(n/cols);
    const col=ci%cols,row=Math.floor(ci/cols);
    const gx=Math.min(vw*.42,300),gy=Math.min(vh*.3,210);
    return{x:cx-gx/2+col*gx,y:cy-gy*(rows-1)/2+row*gy};
  }else{
    // wide (desktop): horizontal row
    const span=Math.min(vw*.72,820),gap=n>1?span/(n-1):0;
    return{x:cx-span/2+ci*gap,y:cy};
  }
}

function iSVG(w,size=88,mode='fit'){
  const sc=size/Math.max(w.w,w.h),rw=Math.round(w.w*sc),rh=Math.round(w.h*sc);
  if(w.img){
    return`<div class="art-box" style="width:${rw}px;height:${rh}px"><img src="${w.img}" alt="${w.t}"></div>`;
  }
  const body=w.svg.replace(/<svg[^>]*>/,'').replace(/<\/svg>/,'');
  return`<div class="art-box" style="width:${rw}px;height:${rh}px"><svg viewBox="0 0 ${w.w} ${w.h}" width="${rw}" height="${rh}" xmlns="http://www.w3.org/2000/svg">${body}</svg></div>`;
}

// pile labels
CATS.forEach((c,i)=>{
  const pp=pilePos(i),lbl=document.createElement('div');
  lbl.className='pile-lbl';lbl.id=`lbl-${i}`;lbl.textContent=c;
  lbl.style.left=pp.x+'px';lbl.style.top=(pp.y+126)+'px';
  world.appendChild(lbl);
});

// pile hits
const pileHits=CATS.map((_,i)=>{
  const el=document.createElement('div');el.className='pile-hit';
  el.style.cssText=`width:360px;height:250px;position:absolute;display:none`;
  el.addEventListener('click',()=>{if(sorted)openLP(i);});
  world.appendChild(el);return el;
});
function updateHits(){CATS.forEach((_,i)=>{const pp=pilePos(i),h=pileHits[i];h.style.left=(pp.x-180)+'px';h.style.top=(pp.y-70)+'px';h.style.display=sorted?'block':'none';});}

// non-overlapping scatter placement
function scatterAll(){
  const WW=getWW(),WH=getWH(),placed=[];
  const isMobile=vp.offsetWidth<768;
  function canPlace(x,y,w,h,pad){
    return placed.every(p=>
      x+w+pad<p.x||
      x>p.x+p.w+pad||
      y+h+pad<p.y||
      y>p.y+p.h+pad
    );
  }
  function boundsFor(expand=0){
    const spreadW=Math.min(WW*(isMobile ? .78+expand : .74+expand*.4),isMobile?860:920);
    const spreadH=Math.min(WH*(isMobile ? .82+expand : .7+expand*.35),isMobile?980:720);
    const minX=Math.max(20,(WW-spreadW)/2);
    const minY=Math.max(24,(WH-spreadH)/2);
    return{
      minX,
      minY,
      maxX:WW-minX,
      maxY:WH-minY
    };
  }
  const items=WORKS.map((w,i)=>({w,i})).sort((a,b)=>(b.w.w*b.w.h)-(a.w.w*a.w.h));
  const result=new Array(WORKS.length);
  items.forEach(({w,i})=>{
    const triesMax=isMobile?900:240;
    let placedItem=null;
    const pads=isMobile?[22,14,8,0]:[24,12,0];
    for(let expandStep=0;expandStep<(isMobile?5:3)&&!placedItem;expandStep++){
      const b=boundsFor(expandStep*.08);
      for(const pad of pads){
        for(let tries=0;tries<triesMax;tries++){
          const x=b.minX+Math.random()*Math.max(1,b.maxX-b.minX-w.w);
          const y=b.minY+Math.random()*Math.max(1,b.maxY-b.minY-w.h);
          const rot=(Math.random()-.5)*(isMobile?9:12);
          if(canPlace(x,y,w.w,w.h,pad)){
            placed.push({x,y,w:w.w,h:w.h});
            placedItem={x,y,rot};
            break;
          }
        }
        if(placedItem)break;
      }
    }
    if(!placedItem){
      const b=boundsFor(isMobile ? .4 : .2);
      const x=b.minX+Math.random()*Math.max(1,b.maxX-b.minX-w.w);
      const y=b.minY+Math.random()*Math.max(1,b.maxY-b.minY-w.h);
      placed.push({x,y,w:w.w,h:w.h});
      placedItem={x,y,rot:(Math.random()-.5)*(isMobile?8:12)};
    }
    result[i]=placedItem;
  });
  return result;
}
const initPos=scatterAll();
const WORKS_BY_CAT=Object.fromEntries(CATS.map(cat=>[cat,WORKS.filter(w=>w.cat===cat)]));

// build states
const states=WORKS.map((w,i)=>{
  const sp=initPos[i];
  const shEl=document.createElement('div');shEl.className='shadow nd';shEl.style.cssText=`width:${w.w*.6}px;height:20px;z-index:1;position:absolute`;world.appendChild(shEl);
  const el=document.createElement('div');el.className='obj nd';el.style.cssText=`left:${sp.x}px;top:${sp.y}px;width:${w.w}px;position:absolute;z-index:${objZ++}`;el.innerHTML=w.img?`<img src="${w.img}" style="width:100%;display:block;pointer-events:none">`:w.svg;el.style.transform=`rotate(${sp.rot}deg)`;el.style.filter='drop-shadow(0 6px 18px rgba(0,0,0,.09))';world.appendChild(el);
  const pileIndex=WORKS_BY_CAT[w.cat].findIndex(item=>item.t===w.t);
  const pileCenter=pileIndex-(WORKS_BY_CAT[w.cat].length-1)/2;
  const s={w,el,shEl,x:sp.x,y:sp.y,rot:sp.rot,hx:sp.x,hy:sp.y,hrot:sp.rot,pileIndex,pileCount:WORKS_BY_CAT[w.cat].length,pileRot:pileCenter*3.5,pileDx:pileCenter*18,pileDy:Math.abs(pileCenter)*8,grabbed:false,dist:0,mode:'scatter',lx:0,ly:0};
  requestAnimationFrame(()=>{el.classList.remove('nd');shEl.classList.remove('nd');});
  el.addEventListener('mouseenter',()=>{if(s.mode==='pile')return;el.style.filter='drop-shadow(0 16px 32px rgba(0,0,0,.14))';});
  el.addEventListener('mouseleave',()=>{el.style.filter='drop-shadow(0 6px 18px rgba(0,0,0,.09))';s.lx=0;s.ly=0;setT(s);});
  el.addEventListener('mousemove',e=>{if(s.mode==='pile')return;const r=el.getBoundingClientRect();s.lx=-(e.clientY-r.top-r.height/2)/r.height*9;s.ly=(e.clientX-r.left-r.width/2)/r.width*9;setT(s);});
  el.addEventListener('click',e=>{e.stopPropagation();if(s.mode==='pile'){openLP(CATS.indexOf(s.w.cat));}else{if(s.w.url){window.location.href=s.w.url;}else{openDetail(s.w,false);}}});
  el.addEventListener('touchend',e=>{if(!isPanning){e.stopPropagation();if(s.mode==='pile'){openLP(CATS.indexOf(s.w.cat));}else{if(s.w.url){window.location.href=s.w.url;}else{openDetail(s.w,false);}}}});
  placeSh(s);return s;
});

function setT(s,sc=1){s.el.style.transform=`rotate(${s.rot}deg) scale(${sc}) perspective(600px) rotateX(${s.lx}deg) rotateY(${s.ly}deg)`;}
function placeSh(s){const lift=s.mode==='pile'?8:14,shsc=.58;s.shEl.style.left=(s.x+s.w.w*(1-shsc)/2)+'px';s.shEl.style.top=(s.y+s.w.h+lift)+'px';s.shEl.style.width=(s.w.w*shsc)+'px';s.shEl.style.opacity=s.mode==='pile'?'.08':'.2';}
function applyPileLayout(s,pp){
  s.x=pp.x-s.w.w/2+s.pileDx;
  s.y=pp.y-s.w.h/2+s.pileDy;
  s.rot=s.pileRot;
}

vp.addEventListener('mousedown',e=>{if(e.target.closest('#toggle,#topbar'))return;isPanning=true;panSX=e.clientX;panSY=e.clientY;panCX=camX;panCY=camY;vp.classList.add('panning');});
vp.addEventListener('touchstart',e=>{if(e.target.closest('#toggle,#topbar'))return;if(e.touches.length===1){isPanning=true;panSX=e.touches[0].clientX;panSY=e.touches[0].clientY;panCX=camX;panCY=camY;}},{passive:true});

function onMove(cx,cy){if(!isPanning)return;camX=panCX-(cx-panSX);camY=panCY-(cy-panSY);clamp();applyC();}
function onUp(){isPanning=false;vp.classList.remove('panning');}
vp.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
vp.addEventListener('touchmove',e=>{if(isPanning){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
vp.addEventListener('mouseup',onUp);vp.addEventListener('touchend',onUp);

// ── toggle ──
toggleEl.addEventListener('click',()=>{
  sorted=!sorted;
  swEl.classList.toggle('on',sorted);
  document.getElementById('sw-lbl').textContent=sorted?t('sort'):t('scatter');
  vp.classList.toggle('dark-mode',sorted);
  updateHits();
  if(sorted){
    const baseZ=objZ+1,pC=CATS.map(()=>0);
    states.forEach(s=>{const ci=CATS.indexOf(s.w.cat),pp=pilePos(ci);applyPileLayout(s,pp);s.lx=0;s.ly=0;s.mode='pile';s.el.style.zIndex=baseZ+ci*20+pC[ci]++;s.el.style.left=s.x+'px';s.el.style.top=s.y+'px';setT(s);placeSh(s);s.el.style.filter='drop-shadow(0 5px 14px rgba(0,0,0,.2))';});
    objZ=baseZ+CATS.length*20+5;
    const vpW=vp.offsetWidth,vpH=vp.offsetHeight;
    let ax=0,ay=0;CATS.forEach((_,i)=>{const pp=pilePos(i);ax+=pp.x;ay+=pp.y;});ax/=CATS.length;ay/=CATS.length;
    camX=ax-vpW/2;camY=ay-vpH/2;clamp();applyC();
    CATS.forEach((_,i)=>{const pp=pilePos(i);const lbl=document.getElementById('lbl-'+i);lbl.style.left=pp.x+'px';lbl.style.top=(pp.y+126)+'px';lbl.style.opacity='1';});
  } else {
    states.forEach(s=>{s.x=s.hx;s.y=s.hy;s.rot=s.hrot;s.lx=0;s.ly=0;s.mode='scatter';s.el.style.left=s.x+'px';s.el.style.top=s.y+'px';setT(s);placeSh(s);s.el.style.filter='drop-shadow(0 6px 18px rgba(0,0,0,.09))';});
    CATS.forEach((_,i)=>document.getElementById(`lbl-${i}`).style.opacity='0');
  }
});

// ── bio ──
bioBtnEl.addEventListener('click',()=>bio.classList.add('open'));
bioClose.addEventListener('click',()=>bio.classList.remove('open'));
bio.addEventListener('click',e=>{if(e.target===bio)bio.classList.remove('open');});

// ── launchpad ──
function openLP(ci){const cat=CATS[ci],catName=(I18N[lang].cats&&I18N[lang].cats[cat])||cat,items=WORKS.filter(w=>w.cat===cat),artSize=Math.min(window.innerWidth<760?148:210,window.innerWidth*.16);lpCat.textContent=catName;lpSub.textContent=`${items.length} ${t('works')}`;lpGrid.innerHTML=items.map(w=>`<div class="lp-icon" data-t="${w.t}"><div class="lp-art">${iSVG(w,artSize,'fit')}</div><div class="lp-name">${w.t}</div><div class="lp-year">${w.y}</div></div>`).join('');lpGrid.querySelectorAll('.lp-icon').forEach(el=>{const w=WORKS.find(x=>x.t===el.dataset.t);el.addEventListener('click',()=>{if(w.url){window.location.href=w.url;}else{openDetail(w,true);}});});lp.classList.add('open');}
lpClose.addEventListener('click',()=>lp.classList.remove('open'));
lp.addEventListener('click',e=>{if(e.target===lp)lp.classList.remove('open');});

// ── detail ──
function openDetail(w,fromLp){
  detBack.textContent=fromLp?t('backCat'):t('back');
  const sm=iSVG(w,220,'fit');
  let h=`<div class="d-hero"><div class="d-art">${sm}</div><div><div class="d-title">${w.t}</div><div class="d-meta">${w.y} · ${w.m}</div><div class="d-badge">${w.cat}</div><div class="d-tags">${w.tags.map(t=>`<span class="d-tag">${t}</span>`).join('')}</div></div></div><div class="div"></div>`;
  h+=`<div class="d-media">${w.video?`<div class="d-cell vid"><div class="pr"><div class="pt"></div></div></div>`:`<div class="d-cell">${t('img')} 01</div>`}<div class="d-cell">${t('img')} 02</div><div class="d-cell">${t('img')} 03</div></div>`;
  h+=`<div class="div"></div><p class="d-desc">${w.desc}</p><div class="div"></div>`;
  if(w.ar)h+=`<button class="d-ar"><div class="d-ari">AR</div><span>${t('ar_launch')}</span></button>`;
  h+=`<div class="d-acts"><button class="d-btn">${t('dl')}</button><button class="d-btn">${t('share')}</button><button class="d-btn">${t('inquiry')}</button></div>`;
  detIn.innerHTML=h;det.classList.add('open');
}
detBack.addEventListener('click',()=>det.classList.remove('open'));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(det.classList.contains('open'))det.classList.remove('open');else if(lp.classList.contains('open'))lp.classList.remove('open');else bio.classList.remove('open');}});

updateHits();
</script>
